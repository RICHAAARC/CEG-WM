# ==============================================================
# 配置角色：paper 消融实验配置
# - 本文件用于“消融实验”研究，不用于论文最终结论口径。
# - 相比 paper_full_cuda.yaml，本文件开启 experiment_matrix.ablation_variants
#   以系统评估模块裁剪 content、geometry、anchor、LF、HF 的影响。
# - 若目标是 paper-faithful 最终结论，请使用 configs/paper_full_cuda.yaml。
# ==============================================================

policy_path: "content_np_geo_rescue"

target_fpr: 0.01

allow_nonempty_run_root: false
allow_nonempty_run_root_reason: null

device: "cuda"

model_id: "stabilityai/stable-diffusion-3.5-medium"
hf_revision: "main"
pipeline_impl_id: "sd3_diffusers_real"
pipeline_build_enabled: true

inference_enabled: true
inference_prompt: "a serene landscape with mountains and a lake"
inference_prompt_file: "prompts/paper_small.txt"
inference_num_steps: 28
inference_guidance_scale: 7.0
inference_height: 512
inference_width: 512

seed: null
allow_threshold_fallback_for_tests: false

trajectory_tap:
  enabled: true
  tensor_types: ["latent"]
  module_paths: ["transformer"]
  stats_precision_digits: 6

paper_faithfulness:
  enabled: true
  alignment_check: true
  check_pipeline_fingerprint: true
  check_trajectory_digest: true

watermark:
  subspace:
    enabled: true
    timestep_start: 0
    timestep_end: 27
    trajectory_step_stride: 1
    sample_count: 28
    feature_dim: 128
  lf:
    enabled: true
    variance: 1.5
    ecc: "sparse_ldpc"
    ecc_sparsity: 3
    message_length: 64
    coding_mode: "pseudogaussian_template_additive"
    decoder: "matched_correlation"
  hf:
    enabled: true
    tail_truncation_ratio: 0.1
    tail_truncation_mode: "projection_tail_truncation"
    tau: 2.0

detect:
  content:
    enabled: true
    lf_exact_repair:
      enabled: true
      mode: "host_template_recenter"
  geometry:
    enabled: true
    enable_attention_anchor: true
    attention_capture_max_layers: 8
    attention_capture_layer_whitelist:
      - "transformer_blocks.0.attn"
      - "transformer_blocks.1.attn"
      - "transformer_blocks.2.attn"
      - "transformer_blocks.3.attn"
      - "transformer_blocks.4.attn"
      - "transformer_blocks.5.attn"
      - "transformer_blocks.6.attn"
      - "transformer_blocks.7.attn"
    sync_primary_anchor_secondary: true
    geo_score_repair:
      enabled: true
      mode: "template_confidence"

enable_mask: true
mask:
  impl_id: "semantic_saliency_model"
  saliency_source: "model"
  semantic_model_source: "inspyrenet"
  semantic_model_path: "../models/inspyrenet/ckpt_base.pth"

embed:
  preview_generation:
    enabled: true
    artifact_rel_path: "preview/preview.png"

ablation:
  # ===================== 消融开关总面板 =====================
  # 在这里定义“可被消融”的模块级开关字段。
  # 约定：
  # - null：表示该开关不在配置层强制，交由 experiment_matrix.ablation_variants 覆写。
  # - true/false：表示固定开启/关闭（会作用于全部实验项）。
  #
  # 使用建议：
  # 1) 先在本段声明开关字段；
  # 2) 再在 experiment_matrix.ablation_variants 中组合这些字段做网格实验。
  # ========================================================

  # 内容链开关：控制 content evidence 计算与内容判别路径。
  enable_content: null

  # 几何链开关：控制 geometry evidence 与同步/门控相关路径。
  enable_geometry: null

  # 辅助锚点开关：控制 attention anchor 等辅证路径。
  enable_anchor: null

  # LF 低频通道开关：控制 LF 编码/检测分支。
  enable_lf: null

  # HF 高频通道开关：控制 HF 编码/检测分支。
  enable_hf: null

  # 仅 LF 模式：true 时应与 hf_only 互斥。
  lf_only: false

  # 仅 HF 模式：true 时应与 lf_only 互斥。
  hf_only: false

calibration:
  detect_records_glob: null
  minimal_ground_truth_pair_count: 30
  minimal_ground_truth_prompts_file: null
  exclude_formal_sidecar_disabled_marker: true

evaluate:
  detect_records_glob: null
  thresholds_path: null
  minimal_ground_truth_pair_count: 30
  minimal_ground_truth_prompts_file: null

impl:
  content_extractor_id: "unified_content_extractor"
  geometry_extractor_id: "attention_anchor_extractor"
  fusion_rule_id: "fusion_neyman_pearson"
  subspace_planner_id: "subspace_planner"
  sync_module_id: "geometry_latent_sync_sd3"
  hf_embedder_id: "high_freq_truncation_codec"
  lf_coder_id: "low_freq_template_codec"
  use_latent_per_step: true

attestation:
  enabled: true
  k_master_env_var: "CEG_WM_K_MASTER"
  k_prompt_env_var: "CEG_WM_K_PROMPT"
  k_seed_env_var: "CEG_WM_K_SEED"
  signature_algorithm: "ed25519"
  signed_bundle_schema: "gen_attest_bundle_v1"
  signer_certificate_schema: "gen_attest_signer_cert_v1"
  require_signed_bundle_verification: true
  threshold: 0.65
  lf_weight: 0.5
  hf_weight: 0.3
  geo_weight: 0.2
  decision_mode: "content_primary_geo_rescue"
  rescue_band_delta_low: 0.05
  geo_rescue_min_score: 0.3
  use_trajectory_mix: false

detect_runtime:
  image_domain_sidecar_enabled: false  # 论文正式路径不允许 image-domain sidecar（v2.0 收口）

paper_ablation_workflow:
  output_root: "outputs/Paper_Ablation_Cuda"
  run_tag: null
  config_snapshot_dir: "compare/config_snapshots"
  base_embed:
    run_subdir: "base_embed"
    embed_record_rel_path: "records/embed_record.json"
    allow_resume: true
    allow_reuse_existing_record: true
    overrides: {}
  detect_rerun:
    variants_dir: "variants"
    compare_dir: "compare"
    input_record_rel_path: "records/embed_record.json"
    variant_dir_pattern: "{suffix}"
    strict_single_variable: true
    allow_detect_only: true
    reuse_existing_detect_results: true
    enable_calibration: false
    enable_evaluate: false
    calibration_detect_records_glob: null
    evaluate_detect_records_glob: null
    reuse_thresholds_artifact: null
    variants:
      - name: "GEO-on"
        suffix: "GEO-on"
        enabled: true
        group: "geo_repair_toggle"
        category: "detect_single_variable"
        description: "Same-object detect rerun with GEO repair enabled while keeping the geometry chain intact."
        overrides:
          detect.geometry.geo_score_repair.enabled: true
      - name: "GEO-off"
        suffix: "GEO-off"
        enabled: true
        group: "geo_repair_toggle"
        category: "detect_single_variable"
        description: "Same-object detect rerun with GEO repair disabled while keeping the geometry chain intact."
        overrides:
          detect.geometry.geo_score_repair.enabled: false
      - name: "LF-repair-on"
        suffix: "LF-repair-on"
        enabled: true
        group: "lf_repair_toggle"
        category: "detect_single_variable"
        description: "Same-object detect rerun with LF exact repair enabled."
        overrides:
          detect.content.lf_exact_repair.enabled: true
      - name: "LF-repair-off"
        suffix: "LF-repair-off"
        enabled: true
        group: "lf_repair_toggle"
        category: "detect_single_variable"
        description: "Same-object detect rerun with LF exact repair disabled."
        overrides:
          detect.content.lf_exact_repair.enabled: false
  compare:
    summary_fields:
      - variant_name
      - variant_suffix
      - variant_group
      - variant_category
      - attestation_status
      - attestation_result_status
      - content_attestation_score
      - event_attestation_score
      - channel_scores_lf
      - channel_scores_hf
      - channel_scores_geo
      - active_score_source
      - active_geo_score_source
      - geo_repair_enabled
      - geo_repair_active
      - geo_repair_mode
      - geo_score_repair_enabled
      - geo_score_repair_active
      - geo_score_repair_mode
      - geo_repair_direction_classification
      - lf_exact_repair_enabled
      - lf_exact_repair_applied
      - lf_exact_repair_mode
      - formal_exact_evidence_source
      - protocol_root_cause_classification
      - variant_run_root
      - detect_record_path
      - input_record_path
      - config_snapshot_path
      - variant_overrides
    table_fields:
      - variant_name
      - variant_suffix
      - variant_group
      - variant_category
      - attestation_status
      - content_attestation_score
      - event_attestation_score
      - channel_scores_lf
      - channel_scores_hf
      - channel_scores_geo
      - active_geo_score_source
      - geo_repair_enabled
      - geo_repair_active
      - geo_repair_mode
      - geo_score_repair_enabled
      - geo_score_repair_active
      - geo_score_repair_mode
      - geo_repair_direction_classification
      - lf_exact_repair_enabled
      - lf_exact_repair_applied
      - lf_exact_repair_mode
      - formal_exact_evidence_source
      - protocol_root_cause_classification
      - detect_record_path
  notebook_runtime:
    repo_source_mode: "local_existing"
    run_tag: null
    selected_variants:
      - "GEO-off"
      - "GEO-on"
    base_embed_reuse_mode: "fresh_run"
    reuse_base_embed_record: null
    package_zip: true
    export_to_drive: true
    output_root: "outputs/Paper_Ablation_Cuda"
    drive_export_subdir: "Paper_Ablation_Cuda"

experiment_matrix:
  config_path: "configs/ablation/paper_ablation_cuda.yaml"
  allow_failed_semantics_collection: true

  # ===================== 消融组合定义区 =====================
  # 每个字典表示“一组消融实验配置”，会通过 CLI override 覆写到 ablation.* 字段。
  # 扩展方式：
  # - 单模块消融：新增 { "enable_xxx": false }
  # - 联合消融：新增 { "enable_xxx": false, "enable_yyy": false }
  # - 恢复基线：使用空字典 {}
  # ========================================================
  ablation_variants:
    # 仅内容链：禁用 geometry（评估几何链贡献）。
    - { "enable_geometry": false }

    # 仅几何链：禁用 content（评估内容链贡献）。
    - { "enable_content": false }

    # 关闭辅锚点：评估 anchor 辅证贡献。
    - { "enable_anchor": false }

    # 仅 LF：禁用 HF，评估 LF 独立贡献。
    - { "enable_hf": false }

    # 仅 HF：禁用 LF，评估 HF 独立贡献。
    - { "enable_lf": false }
