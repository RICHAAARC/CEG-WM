# ==============================================================
# 算法对齐规范（Paper Faithfulness Specification）
# - 本文件是"真实算法完全对齐（paper-faithful）"的唯一权威事实源。
# - append-only，版本化，必须通过审计与测试门禁。
# - 定义目标论文/方法族的对齐维度与可接受偏差。
# - 明确 SD3 Transformer/DiT 适配点。
# ==============================================================

# ------------------------------
# 规范版本与冻结元信息
# ------------------------------
paper_faithfulness_spec_version: "v2.0"
frozen_date: "2026-06-01"
phase: "phase-2-paper-grade-formal-impl-freeze"

# ------------------------------
# 权威性声明
# ------------------------------
authority:
  location: "configs/paper_faithfulness_spec.yaml"
  uniqueness: "唯一权威。本文件定义所有 paper-faithful 对齐约束。"
  modification_policy: "需代码审查 + 影响评估，禁止无审查直接修改。"

# ==============================================================
# 目标方法族（Target Method Families）
#   - 声明所支持的论文方法类别及其核心对齐维度。
#   - 每个方法族定义"必须对齐项"与"可接受偏差项"。
# ==============================================================
target_method_families:

  # ------------------------------
  # Shallow Diffuse 对齐规范
  # ------------------------------
  shallow_diffuse:
    paper_citation: "Shallow Diffuse: Robust and Invisible Watermarking through Low-Dimensional Subspaces in Diffusion Models (arXiv:2410...)"
    enabled: true
    alignment_dimensions:

      # 1) 子空间来源（Subspace Source）
      subspace_source:
        required_alignment: "planner_computed"
        alignment_rule: "子空间基必须由 SubspacePlanner 实时计算，不可使用预设固定基。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.basis_digest"
          - "content_evidence.plan_digest"
          - "content_evidence.subspace_binding_digest"

      # 2) 子空间嵌入位置（Embedding Position）
      embedding_position:
        required_alignment: "latent_space_per_step"
        alignment_rule: "水印必须嵌入到每个扩散步的 latent 张量中，通过 callback hook 实现。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.injection_trace_digest"
          - "content_evidence.trajectory_evidence.trajectory_spec_digest"
        sd3_binding:
          hook_type: "callback_on_step_end"
          target_tensor: "latents"
          hook_module_path: "main.diffusion.sd3.hooks"

      # 3) 轨迹与噪声调度绑定（Trajectory Binding）
      trajectory_binding:
        required_alignment: "scheduler_aware"
        alignment_rule: "轨迹采样必须与 scheduler 的 timesteps/sigmas 绑定，确保可复现性。"
        deviation_policy: "允许采样间隔调整，但必须记录并纳入 trajectory_spec_digest"
        evidence_field_paths:
          - "content_evidence.trajectory_evidence.trajectory_spec_digest"
          - "content_evidence.trajectory_evidence.trajectory_digest"
        sd3_binding:
          scheduler_field_path: "model.scheduler"
          required_spec_fields:
            - "num_inference_steps"
            - "scheduler_class_name"
            - "sample_stride"

  # ------------------------------
  # HF 高频模板编码器对齐规范
  # ------------------------------
  high_freq_truncation_codec:
    paper_citation: "planner-bounded high-frequency subspace tail-truncation watermarking"
    enabled: true
    alignment_dimensions:

      # 1) Planner 绑定的 HF 子空间投影
      hf_subspace_projection:
        required_alignment: "planner_bound_hf_projection"
        alignment_rule: "HF formal path 必须先投影到 planner 输出的 hf_basis，再在该子空间内执行 tail truncation；不得在实现层重新派生 template、codeword 或自选子空间。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.basis_digest"
          - "content_evidence.hf_trace_digest"
          - "content_evidence.hf_evidence_summary"

      # 2) Tail Truncation 规则
      tail_truncation:
        required_alignment: "projection_tail_truncation"
        alignment_rule: "必须对 HF projection coefficients 执行确定性尾部截断；tail_truncation_ratio 与 threshold_percentile 的对应关系必须唯一，且不得回退到 top-k magnitude、template correlation 或随机 codeword。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.hf_trace_digest"
          - "content_evidence.hf_evidence_summary"
        parameter_binding:
          k_field_path: "watermark.hf.tail_truncation_ratio"
          percentile_field_path: "watermark.hf.threshold_percentile"

      # 3) 检测阈值校准（Detection Threshold Calibration）
      threshold_calibration:
        required_alignment: "constrained_hf_energy"
        implementation_note: |
          实际实现：对 planner-bound HF projection coefficients 执行同构 tail truncation，
          然后以 constrained coefficient energy 作为 HF 检测分数。
          不允许 template correlation、Rademacher sign pattern、repetition code 或 top-k magnitude fallback。
        alignment_rule: "检测得分必须来自 planner-bound truncation channel 的 constrained energy；score direction 为 larger indicates stronger watermark evidence。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.hf_score"
          - "thresholds_digest"

  # ------------------------------
  # LF 低频模板编码器对齐规范
  # ------------------------------
  low_freq_template_codec:
    paper_citation: "pseudogaussian template additive watermarking"
    enabled: true
    alignment_dimensions:

      # 1) 编码域（Encoding Domain）
      encoding_domain:
        required_alignment: "pseudogaussian_template_additive"
        implementation_note: |
          实际实现：additive pseudogaussian 模板注入。
          配置项 watermark.lf.coding_mode = "pseudogaussian_template_additive"；
          嵌入：latent[i] += variance * code_bits[i]（加法注入，非符号翻转）。
          检测使用 whitened Pearson correlation（matched correlation）。
        alignment_rule: "水印必须通过加法模板注入 latent 系数域，检测使用 matched correlation。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.lf_trace_digest"
          - "content_evidence.injection_params_digest"
        parameter_binding:
          variance_field_path: "watermark.lf.variance"
          required_values:
            variance: 1.5  # 伪高斯方差（pseudogaussian variance）

      # 2) 纠错码参数（ECC Parameters）
      ecc_parameters:
        required_alignment: "sparse_parity_check"
        alignment_rule: "必须使用稀疏奇偶校验矩阵（t=3 或可配置），支持 BP 解码。"
        deviation_policy: "允许调整 sparsity t 与 message_length，但必须记录并纳入 plan_digest"
        evidence_field_paths:
          - "content_evidence.plan_digest"
          - "content_evidence.lf.ecc_spec_digest"
        parameter_binding:
          ecc_field_path: "watermark.lf.ecc"
          sparsity_field_path: "watermark.lf.ecc_sparsity"
          message_length_field_path: "watermark.lf.message_length"

      # 3) 匹配相关评分（Matched Correlation Decoder）
      bp_decoder:
        required_alignment: "matched_correlation"
        implementation_note: |
          实际实现：whitened Pearson correlation scoring。
          score = whitened Pearson correlation between detected projection and codeword。
          无需 BP 迭代（watermark.lf.decoder = "matched_correlation"）。
        alignment_rule: "检测必须使用 matched correlation 评分（whitened Pearson），无需 BP 迭代。"
        deviation_policy: "禁止偏差"
        evidence_field_paths:
          - "content_evidence.lf_score"
          - "content_evidence.lf_statistics_digest"

# ==============================================================
# SD3 Transformer/DiT 适配点（Mandatory for SD3）
#   - 明确 SD3 特有的 attention blocks、cross-attention、latent 维度等可观测信号。
#   - 任何 SD3 pipeline 必须提供这些可观测证据。
# ==============================================================
sd3_adaptation:

  # SD3 pipeline 结构指纹（Pipeline Structure Fingerprint）
  pipeline_fingerprint:
    required: true
    required_fields:
      - "transformer_num_blocks"
      - "transformer_attention_head_dim"
      - "transformer_num_attention_heads"
      - "transformer_in_channels"
      - "transformer_out_channels"
      - "scheduler_class_name"
      - "scheduler_num_train_timesteps"
      - "vae_latent_channels"
      - "text_encoder_names"
    evidence_field_paths:
      - "content_evidence.pipeline_fingerprint"
      - "content_evidence.pipeline_fingerprint_digest"
    computation_rule: "必须从 diffusers pipeline 对象动态提取，不可硬编码。"

  # SD3 扩散轨迹采样（Diffusion Trace Sampling）
  diffusion_trace:
    required: true
    required_fields:
      - "trajectory_spec.sample_stride"
      - "trajectory_spec.num_inference_steps"
      - "trajectory_metrics.timestep_samples"
      - "trajectory_metrics.sigma_samples"
      - "trajectory_metrics.latent_norm_samples"
    evidence_field_paths:
      - "content_evidence.trajectory_evidence.trajectory_spec_digest"
      - "content_evidence.trajectory_evidence.trajectory_digest"
    computation_rule: "每 K 步采样一次（K 由 sample_stride 决定），记录 timestep/sigma/latent_norm。"

  # SD3 注入点绑定（Injection Site Binding）
  injection_site_binding:
    required: true
    required_fields:
      - "hook_type"
      - "target_module_name"
      - "target_tensor_name"
      - "hook_timing"
      - "injection_rule_digest"
    evidence_field_paths:
      - "content_evidence.injection_site_spec"
      - "content_evidence.injection_site_digest"
    computation_rule: "必须从实际 hook 配置动态生成，禁止假值或基线缺省值。"

# ==============================================================
# 对齐检查规则（Alignment Check Rules）
#   - 定义如何从 records 证据中判定"是否对齐"。
#   - 任何不对齐必须触发 audit FAIL。
# ==============================================================
alignment_check_rules:

  # 规则 1：pipeline_fingerprint 必须存在且非基线缺省值
  pipeline_fingerprint_presence:
    check_type: "presence_and_non_baseline"
    target_field_paths:
      - "content_evidence.pipeline_fingerprint"
      - "content_evidence.pipeline_fingerprint_digest"
    failure_action: "FAIL"
    failure_message: "SD3 pipeline fingerprint 缺失或为基线缺省值"

  # 规则 2：trajectory_digest 必须存在且可复算
  trajectory_digest_reproducibility:
    check_type: "digest_reproducibility"
    target_field_paths:
      - "content_evidence.trajectory_evidence.trajectory_spec_digest"
      - "content_evidence.trajectory_evidence.trajectory_digest"
    failure_action: "FAIL"
    failure_message: "轨迹摘要缺失或不可复算"

  # 规则 3：injection_site_spec 必须与 paper_spec 对齐
  injection_site_alignment:
    check_type: "spec_conformance"
    target_field_paths:
      - "content_evidence.injection_site_spec"
    required_keys_by_method:
      shallow_diffuse: ["hook_type", "target_tensor"]
      hf_truncation_codec: ["hook_type", "truncation_site"]
      lf_template_codec: ["hook_type", "encoding_site"]
    failure_action: "FAIL"
    failure_message: "注入点规范与 paper_spec 不一致"

  # 规则 4：方法特定参数必须绑定
  method_specific_parameter_binding:
    check_type: "parameter_binding"
    bindings:
      hf_truncation_codec:
        - field_path: "watermark.hf.tail_truncation_mode"
          required_value: "projection_tail_truncation"
        - field_path: "watermark.hf.enabled"
          required_value: true
      lf_template_codec:
        - field_path: "watermark.lf.variance"
          required_value: 1.5
        - field_path: "watermark.lf.ecc"
          required_value: "sparse_ldpc"
    failure_action: "FAIL"
    failure_message: "方法特定参数未正确绑定"

# ==============================================================
# 审计与测试门禁要求（Audit & Test Gate Requirements）
#   - 明确哪些审计与测试必须覆盖。
#   - 任何缺失或失败必须阻断签署流程。
# ==============================================================
audit_gate_requirements:

  # 审计 1：paper_spec_digest 绑定审计
  paper_spec_digest_binding:
    audit_script: "scripts/audits/audit_paper_faithfulness_runtime_must_have.py"
    check_rule: "所有 records 必须绑定 paper_spec_digest 且可复算"
    failure_level: "BLOCK"

  # 审计 2：pipeline_fingerprint 一致性审计
  pipeline_fingerprint_consistency:
    audit_script: "scripts/audits/audit_paper_faithfulness_runtime_must_have.py"
    check_rule: "同一 cfg_digest 下的 records 必须具有一致的 pipeline_fingerprint_digest"
    failure_level: "BLOCK"

  # 审计 3：injection_site 变化审计
  injection_site_drift:
    audit_script: "scripts/audits/audit_paper_faithfulness_runtime_must_have.py"
    check_rule: "注入点变化必须体现在 injection_site_digest 中，任何未记录的变化必须 FAIL"
    failure_level: "BLOCK"

  # 审计 4：对齐证据完整性审计
  alignment_evidence_completeness:
    audit_script: "scripts/audits/audit_paper_faithfulness.py"
    check_rule: "所有 enabled 方法族的对齐证据字段必须齐全且非基线缺省值"
    failure_level: "BLOCK"

test_gate_requirements:

  # 测试 1：未绑定 paper_spec 必须 FAIL
  test_paper_spec_binding_required:
    test_file: "tests/test_paper_faithfulness_gate.py"
    test_function: "test_paper_spec_digest_required"
    check_rule: "未绑定 paper_spec_digest 的 records 必须触发 FAIL"

  # 测试 2：pipeline 结构变化未体现在 fingerprint 中必须 FAIL
  test_pipeline_fingerprint_drift:
    test_file: "tests/test_paper_faithfulness_gate.py"
    test_function: "test_pipeline_structure_change_must_update_fingerprint"
    check_rule: "更换 SD3 pipeline 版本但未更新 pipeline_fingerprint 必须 FAIL"

  # 测试 3：注入点变化未记录必须 FAIL
  test_injection_site_drift:
    test_file: "tests/test_paper_faithfulness_gate.py"
    test_function: "test_injection_site_change_must_update_digest"
    check_rule: "hook 位置变化但未更新 injection_site_digest 必须 FAIL"

# ==============================================================
# 单一路径收口约束（Single Path Closure Constraints）
#   （v2.0 追加，append-only）
#   明确论文正式执行路径的排他性限制：
#   - 无 fallback：不允许静默降级为非正式实现。
#   - 无 proxy：不允许使用 attention proxy 代替真实 self-attention。
#   - 无 sidecar：不允许 image-domain sidecar 注入额外评分。
#   - 无旁路：唯一论文级闭环路径，无备选执行分支。
# ==============================================================
single_path_closure_constraints:
  version: "v2.0"
  frozen_date: "2026-04-01"

  no_fallback:
    constraint: "禁止任何 fallback 降级路径（content_fallback_no_geometry 等策略不允许出现在正式运行中）。"
    enforcement: "freeze_gate 拒绝写入 'fallback_used=true' 的 records。"
    policy_path_check: "policy_path 不允许为 content_fallback_no_geometry。"

  no_proxy:
    constraint: "禁止使用 attention proxy 替代真实 self-attention 几何证据。"
    enforcement: "paper_faithfulness.enabled=true 时，代码层强制 enable_attention_proxy=False。"
    impl_constraint: "anchor_evidence_level 必须为 'real'，不允许 'proxy'。"

  no_sidecar:
    constraint: "禁止 image-domain sidecar 向内容评分注入图像域原始分数。"
    enforcement: "detect_runtime.image_domain_sidecar_enabled 必须为 false 或缺失（默认 false 在 paper 模式下）。"
    config_check: "configs/paper_full_cuda.yaml 和 configs/ablation/paper_ablation_cuda.yaml 中 image_domain_sidecar_enabled 必须为 false。"

  fusion_gate_semantics:
    constraint: "几何救回门控（geo gate）必须为单侧（geometry_score >= geo_gate_threshold），不允许双侧上限截断。"
    rationale: "双侧截断会错误地拒绝高置信度几何证据，与论文单调性假设矛盾。"
    enforcement: "_check_geo_gate 使用 geometry_score >= geo_gate_lower，geo_gate_upper 字段仅为审计保留。"
