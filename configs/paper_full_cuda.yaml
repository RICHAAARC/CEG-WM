policy_path: "content_with_geometry_gate"

target_fpr: 0.01

allow_nonempty_run_root: false
allow_nonempty_run_root_reason: null

device: "cuda"

model_id: "stabilityai/stable-diffusion-3.5-medium"
hf_revision: "main"
pipeline_impl_id: "sd3_diffusers_real_v1"
pipeline_build_enabled: true

inference_enabled: true
inference_prompt: "a serene landscape with mountains and a lake"
inference_prompt_file: "prompts/paper_small.txt"
inference_num_steps: 28
inference_guidance_scale: 7.0
inference_height: 512
inference_width: 512

seed: null  # 随机种子（null 表示自动生成，可通过 CLI override 覆盖）
allow_threshold_fallback_for_tests: false

trajectory_tap:
  enabled: true
  tensor_types: ["latent"]
  module_paths: ["transformer"]
  stats_precision_digits: 6

paper_faithfulness:
  enabled: true
  alignment_check: true
  check_pipeline_fingerprint: true
  check_trajectory_digest: true

watermark:
  subspace:
    enabled: true
    timestep_start: 0
    timestep_end: 27
    trajectory_step_stride: 1
    sample_count: 28
    feature_dim: 128
  lf:
    enabled: true
    variance: 1.5
    ecc: "sparse_ldpc"
    ecc_sparsity: 3
    message_length: 64
    coding_mode: "latent_space_sign_flipping"
    decoder: "belief_propagation"
  hf:
    enabled: true
    tail_truncation_ratio: 0.1
    tail_truncation_mode: "top_k_per_latent"
    selection: "top_k_magnitude_based"
    tau: 2.0

detect:
  content:
    enabled: true
  geometry:
    enabled: true
    enable_attention_anchor: true
    attention_capture_max_layers: 8
    attention_capture_layer_whitelist:
      - "transformer_blocks.0.attn"
      - "transformer_blocks.1.attn"
      - "transformer_blocks.2.attn"
      - "transformer_blocks.3.attn"
      - "transformer_blocks.4.attn"
      - "transformer_blocks.5.attn"
      - "transformer_blocks.6.attn"
      - "transformer_blocks.7.attn"
    # 显式声明几何证据层级：latent sync 为主几何实现（低阶几何反演），
    # attention anchor 仅作辅锚点（主同步成功后参与一致性评估）。
    sync_primary_anchor_secondary: true

enable_mask: true
mask:
  impl_id: "semantic_saliency_v2"
  saliency_source: "model_v2"   # 强制使用真实模型，禁止自动 proxy fallback（P1-4 修复）
  semantic_model_path: "/content/models/inspyrenet/inspyrenet_plus_ultra.pth"

embed:
  test_mode_identity: false

calibration:
  detect_records_glob: null  # detect 记录 glob 路径（由 experiment_matrix 注入）
  minimal_ground_truth_pair_count: 30  # onefile 最小 GT 闭环生成对数（positive/negative）
  minimal_ground_truth_prompts_file: null  # 可选：通过 prompts 文件驱动 GT 对数（行数即 pair_count）

evaluate:
  detect_records_glob: null  # detect 记录 glob 路径（由 experiment_matrix 注入）
  thresholds_path: null      # 阈值工件路径（由 experiment_matrix 注入）
  minimal_ground_truth_pair_count: 30  # onefile 最小 GT 闭环生成对数（positive/negative）
  minimal_ground_truth_prompts_file: null  # 可选：通过 prompts 文件驱动 GT 对数（行数即 pair_count）

impl:
  content_extractor_id: "unified_content_extractor_v1"
  geometry_extractor_id: "attention_anchor_map_relation_v1"
  fusion_rule_id: "fusion_neyman_pearson_v1"
  subspace_planner_id: "subspace_planner_v1"
  sync_module_id: "geometry_latent_sync_sd3_v2"
  hf_embedder_id: "hf_embedder_t2smark_v1"
  lf_coder_id: "lf_coder_prc_v1"
  use_latent_per_step: true

detect_runtime:
  image_domain_sidecar_enabled: false

experiment_matrix:
  config_path: "configs/paper_full_cuda.yaml"
  allow_failed_semantics_collection: true
  # 默认消融变体轴：覆盖论文核心消融因子
  # （1）仅内容链，禁用几何
  # （2）仅几何链，禁用内容
  # （3）禁用辅锚点
  # （4）仅 LF 低频，禁用 HF
  # （5）仅 HF 高频，禁用 LF
  ablation_variants:
    - { "enable_geometry": false }        # 禁用几何链（对应 ablation.enable_geometry=false）
    - { "enable_content": false }         # 禁用内容链（对应 ablation.enable_content=false）
    - { "enable_anchor": false }          # 禁用辅锚点（对应 ablation.enable_anchor=false）
    - { "enable_hf": false }              # 禁用 HF 高频通道，仅保留 LF（验证低频编码对隐蔽性的独立贡献）
    - { "enable_lf": false }              # 禁用 LF 低频通道，仅保留 HF（验证尾截断对鲁棒性的独立贡献）
