# ==============================================================
# 配置角色：paper_full_cuda 一体化正式主配置
# - 本文件用于 paper 语义下的完整机制运行：subspace、LF、HF、geometry
#   detection 与事件级 attestation 全部启用。
# - 默认统计主链为 content_score，用于主 calibration/evaluate 闭环。
# - 同时启用 parallel_attestation_statistics，在不替换主链的前提下，
#   并行补齐 event_attestation_score 的正式统计闭环。
# - 若目标是“仅以 attestation 分数作为单一主统计链”运行，请使用
#   configs/ablation/paper_attestation_score_cuda.yaml。
# ==============================================================

policy_path: "content_np_geo_rescue"

target_fpr: 0.01

allow_nonempty_run_root: false
allow_nonempty_run_root_reason: null

device: "cuda"

model_id: "stabilityai/stable-diffusion-3.5-medium"
hf_revision: "main"
pipeline_impl_id: "sd3_diffusers_real"
pipeline_build_enabled: true

inference_enabled: true
inference_prompt: "a serene landscape with mountains and a lake"
inference_prompt_file: "prompts/paper_small.txt"
inference_num_steps: 28
inference_guidance_scale: 7.0
inference_height: 512
inference_width: 512

seed: null  # 随机种子（null 表示自动生成，可通过 CLI override 覆盖）
allow_threshold_fallback_for_tests: false

trajectory_tap:
  enabled: true
  tensor_types: ["latent"]
  module_paths: ["transformer"]
  stats_precision_digits: 6

paper_faithfulness:
  enabled: true
  alignment_check: true
  check_pipeline_fingerprint: true
  check_trajectory_digest: true

watermark:
  subspace:
    enabled: true
    timestep_start: 0
    timestep_end: 27
    trajectory_step_stride: 1
    sample_count: 28
    feature_dim: 128
    rank: 128
  lf:
    enabled: true
    variance: 1.5
    ecc: "sparse_ldpc"
    ecc_sparsity: 3
    message_length: 64
    coding_mode: "pseudogaussian_template_additive"
    decoder: "matched_correlation"  # 保留 formal token；实际检测为 whitened Pearson correlation + soft LLR + sparse LDPC BP decode 的组合路径
    bp_iterations: 100  # 从 50 提升至 100，改善 LF BP 收敛概率（RUNTIME-02 验证后可进一步调整）
  hf:
    enabled: true
    selection: "attestation_conditioned_projection_tail"
    tail_truncation_ratio: 0.1
    tail_truncation_mode: "projection_tail_truncation"
    tau: 2.0

detect:
  content:
    enabled: true
  geometry:
    enabled: true
    enable_attention_anchor: true
    enable_align_invariance: true
    attention_capture_max_layers: 8
    attention_capture_layer_whitelist:
      - "transformer_blocks.0.attn"
      - "transformer_blocks.1.attn"
      - "transformer_blocks.2.attn"
      - "transformer_blocks.3.attn"
      - "transformer_blocks.4.attn"
      - "transformer_blocks.5.attn"
      - "transformer_blocks.6.attn"
      - "transformer_blocks.7.attn"
    # 显式声明几何正式链：sync primary -> anchor secondary ->
    # observation-driven coarse registration -> robust refinement -> inverse recovery ->
    # recovered-domain sync/anchor/overlap revalidation。
    sync_primary_anchor_secondary: true
    align_inverse_max_residual: 0.18
    align_max_correspondence_count: 24
    align_template_overlap_min: 0.70
    align_recovered_sync_consistency_min: 0.55
    align_recovered_anchor_consistency_min: 0.50
  calibration_artifact_path: null  # NP 阈值工件路径；null 表示运行时通过 --thresholds_path 注入
                                   # 可设为 outputs/.../artifacts/thresholds/thresholds.json（或由 experiment_matrix override 注入）

enable_mask: true
mask:
  impl_id: "semantic_saliency_model"
  saliency_source: "model"   # 强制使用真实模型，禁止自动 proxy fallback
  semantic_model_source: "inspyrenet"
  semantic_model_path: "models/inspyrenet/ckpt_base.pth"

embed:
  preview_generation:
    enabled: true                          # 在正式嵌入前执行无注入预览推理，消除 embed 输入图主链不自足
    artifact_rel_path: "preview/preview.png"  # 预览图相对 artifacts/ 的路径（用于审计）

ablation:
  enable_content: null
  enable_geometry: null
  enable_anchor: null
  enable_lf: null
  enable_hf: null
  lf_only: false
  hf_only: false

calibration:
  detect_records_glob: null  # detect 记录 glob 路径；为空时由标准 workflow / CLI 基于当前 run_root 自动解析
  score_name: "content_score"  # 默认统计主链；若需切换到事件级 attestation 正式统计链，可改为 "event_attestation_score"
  minimal_ground_truth_pair_count: 100  # onefile 最小 GT 闭环生成对数（positive/negative）；≥100 保证离散 FPR 粒度 1/100≤1%
  minimal_ground_truth_prompts_file: "prompts/prompts_100.txt"  # 100 条 prompt 驱动各对克隆样本的 inference_prompt 元数据多样性；run_id 唯一性已由代码层保证（P0-C 已落地）
  exclude_formal_sidecar_disabled_marker: true
  exclude_synthetic_negative_closure_marker: true

evaluate:
  detect_records_glob: null  # detect 记录 glob 路径；为空时由标准 workflow / CLI 基于当前 run_root 自动解析
  thresholds_path: null      # 阈值工件路径；为空时由标准 workflow / CLI 基于当前 run_root 自动解析
  score_name: "content_score"  # 默认评测主链；若消费 attestation 阈值工件，应与 calibration.score_name 保持一致
  minimal_ground_truth_pair_count: 100  # onefile 最小 GT 闭环生成对数（positive/negative）；≥100 保证离散 FPR 粒度 1/100≤1%
  minimal_ground_truth_prompts_file: "prompts/prompts_100.txt"  # 100 条 prompt 驱动各对克隆样本的 inference_prompt 元数据多样性；run_id 唯一性已由代码层保证（P0-C 已落地）
  exclude_synthetic_negative_closure_marker: true

parallel_attestation_statistics:
  enabled: true  # paper onefile 主线保留 content_score，同时并行补齐 attestation 正式统计链
  calibration_score_name: "event_attestation_statistics_score"
  evaluate_score_name: "event_attestation_statistics_score"

impl:
  content_extractor_id: "unified_content_extractor"
  geometry_extractor_id: "attention_anchor_extractor"
  fusion_rule_id: "fusion_neyman_pearson"
  subspace_planner_id: "subspace_planner"
  sync_module_id: "geometry_latent_sync_sd3"
  hf_embedder_id: "high_freq_truncation_codec"
  lf_coder_id: "low_freq_template_codec"
  use_latent_per_step: true

# 密码学生成溯源（Cryptographic Generation Attestation）配置。
# 密钥从环境变量读取，不入版本控制；未设置环境变量时主路径写出显式 absent semantics，
# 不再由 onefile 后置 hook 旁路重算 attestation。
# 设置方法：export CEG_WM_K_MASTER=<hex64> CEG_WM_K_PROMPT=<hex32> CEG_WM_K_SEED=<hex32>
attestation:
  enabled: true
  k_master_env_var: "CEG_WM_K_MASTER"  # 主密钥环境变量名
  k_prompt_env_var: "CEG_WM_K_PROMPT"  # prompt 承诺密钥环境变量名
  k_seed_env_var: "CEG_WM_K_SEED"      # seed 承诺密钥环境变量名
  signature_algorithm: "ed25519"
  signed_bundle_schema: "gen_attest_bundle_v1"
  signer_certificate_schema: "gen_attest_signer_cert_v1"
  require_signed_bundle_verification: true
  threshold: 0.65    # attested 判决阈值（方法论定义默认值）
  lf_weight: 0.5     # LF 通道融合权重
  hf_weight: 0.3     # HF 通道融合权重
  geo_weight: 0.2    # GEO 通道融合权重
  decision_mode: "content_primary_geo_rescue"  # 事件级 attestation 采用内容主判定、几何单向 rescue
  rescue_band_delta_low: 0.05  # 仅当内容侧分数落入 [threshold-0.05, threshold) 时允许几何 rescue
  geo_rescue_min_score: 0.3    # 几何 rescue 的最低可信门槛
  use_trajectory_mix: false  # 子进程模式无法传递 latent tensor，禁用轨迹混合

detect_runtime:
  image_domain_sidecar_enabled: false  # 论文正式路径不允许 image-domain sidecar（v2.0 收口）

experiment_matrix:
  config_path: "configs/paper_full_cuda.yaml"
  allow_failed_semantics_collection: true
  # seeds 数量控制正样本规模：论文级 FPR ≤ 1% 需 n_pos ≥ 100，种子数应 ≥ 100。
  # 当前 seeds=[0,1] 为机制验证阶段（仅 2 个 seed）；正式论文运行请扩展为 range(100)。
  # 运行时通过 scripts/run_experiment_matrix.py 自动映射 seeds 为 CLI overrides（seed=0, seed=1, ...），
  # calibrate/evaluate 的 detect_records_glob 与 thresholds_path 在标准 workflow 中由当前 run_root 自动补全。
  seeds: [0, 1]
  # 论文复现实验主配置：仅保留 faithful baseline。
  # 消融实验请使用 configs/ablation 目录下的专用配置。
