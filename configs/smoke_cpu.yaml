# 轻量 smoke profile：用于 CPU 优先闭环验证，不代表论文正式结果。
# 目标：验证 onefile 主链、records closure、LF/HF 内容路径、
# calibrate/evaluate 只读阈值链与 signoff 路径均可执行。

policy_path: "content_only"

target_fpr: 0.01

allow_nonempty_run_root: false
allow_nonempty_run_root_reason: null

device: "cpu"

model_id: "stabilityai/stable-diffusion-3.5-medium"
hf_revision: "main"
pipeline_impl_id: "sd3_diffusers_shell"

inference_enabled: true
inference_prompt: "smoke verification prompt"
inference_prompt_file: "prompts/prompts_1.txt"
inference_num_steps: 4
inference_guidance_scale: 4.0
inference_height: 64
inference_width: 64

seed: 0
allow_threshold_fallback_for_tests: false

trajectory_tap:
  enabled: true
  tensor_types: ["latent"]
  module_paths: ["transformer"]
  stats_precision_digits: 6

paper_faithfulness:
  enabled: false
  alignment_check: false
  check_pipeline_fingerprint: false
  check_trajectory_digest: false

watermark:
  subspace:
    enabled: true
    timestep_start: 0
    timestep_end: 3
    trajectory_step_stride: 1
    sample_count: 4
    feature_dim: 32
  lf:
    enabled: true
    variance: 1.5
    ecc: "sparse_ldpc"
    ecc_sparsity: 3
    message_length: 32
    coding_mode: "pseudogaussian_template_additive"
    decoder: "matched_correlation"
  hf:
    enabled: true
    selection: "attestation_conditioned_projection_tail"
    tail_truncation_ratio: 0.1
    tail_truncation_mode: "projection_tail_truncation"
    tau: 2.0

detect:
  content:
    enabled: true
  geometry:
    enabled: false
    enable_attention_anchor: true
    enable_align_invariance: true
    sync_primary_anchor_secondary: true
    align_inverse_max_residual: 0.30
    align_max_correspondence_count: 12
    align_template_overlap_min: 0.40
    align_recovered_sync_consistency_min: 0.20
    align_recovered_anchor_consistency_min: 0.20
  calibration_artifact_path: null

enable_mask: false

embed:
  preview_generation:
    enabled: true
    artifact_rel_path: "preview/preview.png"

ablation:
  enable_content: null
  enable_geometry: null
  enable_anchor: null
  enable_lf: null
  enable_hf: null
  lf_only: false
  hf_only: false

calibration:
  detect_records_glob: null
  minimal_ground_truth_pair_count: 2
  minimal_ground_truth_prompts_file: "prompts/prompts_1.txt"

evaluate:
  detect_records_glob: null
  thresholds_path: null
  minimal_ground_truth_pair_count: 2
  minimal_ground_truth_prompts_file: "prompts/prompts_1.txt"

impl:
  content_extractor_id: "unified_content_extractor"
  geometry_extractor_id: "attention_anchor_extractor"
  fusion_rule_id: "fusion_neyman_pearson"
  subspace_planner_id: "subspace_planner"
  sync_module_id: "geometry_latent_sync_sd3"
  hf_embedder_id: "high_freq_truncation_codec"
  lf_coder_id: "low_freq_template_codec"
  use_latent_per_step: true

attestation:
  enabled: false
  k_master_env_var: "CEG_WM_K_MASTER"
  k_prompt_env_var: "CEG_WM_K_PROMPT"
  k_seed_env_var: "CEG_WM_K_SEED"
  signature_algorithm: "ed25519"
  signed_bundle_schema: "gen_attest_bundle_v1"
  signer_certificate_schema: "gen_attest_signer_cert_v1"
  require_signed_bundle_verification: true
  threshold: 0.65
  lf_weight: 0.5
  hf_weight: 0.3
  geo_weight: 0.2
  use_trajectory_mix: false

detect_runtime:
  image_domain_sidecar_enabled: false

experiment_matrix:
  config_path: "configs/smoke_cpu.yaml"
  allow_failed_semantics_collection: true
  seeds: [0]
  ablation_variants: [{}]
