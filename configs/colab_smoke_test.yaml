# ==============================================================
# Colab Smoke Test 配置
# 基于 configs/default.yaml，针对 Colab 环境优化
# ==============================================================

policy_path: "content_only"

# 统计口径
target_fpr: 0.01

# ==============================================================
# 设备配置（Colab GPU）
# ==============================================================
device: "cuda"  # Colab 默认使用 GPU

# ==============================================================
# SD3 模型配置
# ==============================================================
model_id: "stabilityai/stable-diffusion-3-medium"
hf_revision: "main"

# ==============================================================
# 推理配置（Smoke Test 优化：工程稳定性测试，非论文级）
# ==============================================================
inference_enabled: true
inference_prompt: "a serene landscape with mountains and a lake"
inference_num_steps: 15  # 极简推理步数，仅验证工程闭环（default: 28）
inference_guidance_scale: 7.0
inference_height: 128    # 最小分辨率，T4 GPU 安全运行（default: 512）
inference_width: 128

# ==============================================================
# 轨迹采样配置
# ==============================================================
trajectory_tap:
  enabled: true
  tensor_types: ["latent"]
  module_paths: ["transformer"]
  stats_precision_digits: 6

# ==============================================================
# Paper Faithfulness 配置
# ==============================================================
paper_faithfulness:
  enabled: true
  alignment_check: true
  check_pipeline_fingerprint: true
  check_trajectory_digest: true

# ==============================================================
# 水印子空间配置（Smoke Test 极简：工程稳定性验证）
# ==============================================================
watermark:
  subspace:
    timestep_start: 0
    timestep_end: 14  # 匹配 num_inference_steps - 1 = 15 - 1
    trajectory_step_stride: 1
    sample_count: 15  # 匹配 num_inference_steps
    feature_dim: 32   # 极简维度，仅验证流程（default: 128）

  lf:
    enabled: true
    variance: 1.5
    ecc_sparsity: 2   # 降低稀疏度以加速
    message_length: 16  # 极简消息长度（default: 64）

  hf:
    enabled: false  # Smoke test 默认禁用 HF 通道
    tail_truncation_ratio: 0.1
    tail_truncation_mode: "top_k_per_latent"
    tau: 2.0

# ==============================================================
# 检测配置
# ==============================================================
detect:
  content:
    enabled: false  # Embed 模式（检测在 detect 侧启用）
  geometry:
    enabled: false

# ==============================================================
# 内容链配置
# ==============================================================
enable_mask: true

# ==============================================================
# 嵌入配置
# ==============================================================
embed:
  test_mode_identity: false

# ==============================================================
# 实现标识
# ==============================================================
impl:
  content_extractor_id: "unified_content_extractor_v1"
  geometry_extractor_id: "geometry_baseline_identity_v1"
  fusion_rule_id: "fusion_baseline_identity_v1"
  subspace_planner_id: "subspace_planner_v1"
  sync_module_id: "geometry_sync_baseline_v1"

# ==============================================================
# Calibrate 配置（Smoke Test 极简：工程验证级）
# ==============================================================
calibrate:
  num_wrong_key_samples: 32  # 极简样本数，仅验证流程（default: 128）
  batch_size: 4              # T4 GPU 保守配置

# ==============================================================
# Colab 环境优化（T4 GPU 保守配置）
# ==============================================================
colab_optimizations:
  # 内存优化
  enable_xformers: true      # 如果可用，启用 xformers 以减少内存
  enable_attention_slicing: true
  enable_vae_slicing: true   # 启用 VAE slicing 进一步降低内存
  enable_cpu_offload: false  # Colab 有 GPU，不需要 CPU offload
  
  # 缓存优化
  use_cached_models: true    # 使用 Hugging Face 缓存
  cache_dir: null            # 使用默认缓存路径
  
  # 输出优化
  save_intermediate_steps: false  # 不保存中间步骤以节省空间
  compress_artifacts: false       # 不压缩以加速
  
  # 测试模式标识
  engineering_smoke_test: true    # 标识为工程稳定性测试，非论文级研究
