# ==============================================================
# Paper Faithfulness 运行时配置
# - 用于验证 P1/P2 alignment checks 的完整配置
# - 启用真实推理与轨迹采样
# - 不修改 default.yaml，保持测试环境独立性
# ==============================================================

# 继承 default.yaml 的基础配置
# policy_path: "content_only"
# target_fpr: 0.01

# ==============================================================
# 推理配置（Inference Configuration）
# ==============================================================
inference_enabled: true
inference_prompt: "a serene landscape with mountains and a lake"
inference_num_steps: 28
inference_guidance_scale: 7.0
inference_height: 1024
inference_width: 1024

# ==============================================================
# 轨迹采样配置（Trajectory Tap Configuration）
# ==============================================================
trajectory_tap:
  enabled: true
  # SD3 使用 Transformer/DiT，不是 UNet
  tensor_types: ["latent"]
  module_paths: ["transformer"]
  stats_precision_digits: 6

# ==============================================================
# SD3 模型配置（SD3 Model Configuration）
# ==============================================================
# 模型 ID 与版本
model_id: "stabilityai/stable-diffusion-3-medium"
hf_revision: "main"

# 设备配置
# 本地调试可使用 "cpu"，生产环境建议 "cuda"
device: "cpu"

# ==============================================================
# 水印子空间配置（Watermark Subspace Configuration）
# ==============================================================
watermark:
  # 子空间参数（与轨迹采样绑定，确保可复现性）
  subspace:
    timestep_start: 0
    timestep_end: 27  # num_inference_steps - 1 = 28 - 1
    trajectory_step_stride: 1  # 每步都采样
    sample_count: 28  # 与 num_inference_steps 一致
    feature_dim: 128  # latent 特征维度

  # LF (低频) Channel 配置
  lf:
    enabled: false  # 初期验证时可关闭真实水印注入
    variance: 1.5
    ecc_sparsity: 3
    message_length: 64

  # HF (高频) Channel 配置
  hf:
    enabled: false  # 初期验证时可关闭真实水印注入
    tail_truncation_ratio: 0.1
    tail_truncation_mode: "top_k_per_latent"
    tau: 2.0

# ==============================================================
# 实现标识（Implementation Identities）
# ==============================================================
impl:
  content_extractor_id: "content_baseline_noop_v1"
  geometry_extractor_id: "geometry_baseline_noop_v1"
  fusion_rule_id: "fusion_baseline_identity_v1"
  subspace_planner_id: "subspace_planner_v1"
  sync_module_id: "geometry_sync_baseline_v1"

# ==============================================================
# 检测几何配置（Detection Geometry Configuration）
# ==============================================================
detect:
  geometry:
    enabled: false  # 初期验证仅关注 content chain

# ==============================================================
# 随机种子（Random Seed）
# ==============================================================
# 通过 CLI --override "seed=42" 指定，确保可复现性
# 不在配置文件中硬编码，允许运行时覆盖
