# ==============================================================
# 运行期白名单
#   本文件定义“运行期允许集合”，用于门禁收口。
#   - 限制 policy_path 只能取允许集合中的值。
#   - 限制 registry/impl_id/decoder_type/method/feature 等枚举，只能取允许集合中的值。
#   - 限制 CLI override 只能覆写允许字段，且可选地限制取值域。
#   - 为 freeze_gate 提供 whitelist_version 与 whitelist_digest 的可审计锚点。
#   - 本文件不冻结 records 语义、失败语义、digest 口径。
#   - 本文件不定义 policy_path 的语义映射。
# ==============================================================

# ------------------------------
# 白名单版本：用于 records 记录与审计。
# ------------------------------
whitelist_version: "v2.0"    # 运行期白名单版本号：任意一次运行必须记录到 records 中，且不可由 CLI 任意指定。
                             # v1.0→v1.1：追加 detect_calibration_artifact_path override（P1-A，2026-03-10）。
                             # v1.1→v2.0：论文正式路径收口（2026-03-11）；移除全部旧 v1 paper-impl；仅保留 v2/v3 正式实现族与测试支架基线。

# ==============================================================
# policy_path 允许集合
#   - 限制“融合策略路径”的取值域，避免出现未定义/未审计的策略组合。
#   - 与 policy_path_semantics.yaml 形成闭合关系。
#      - runtime_whitelist.yaml 中 allowed 的每个 policy_path。
#      - 必须在 policy_path_semantics.yaml 中存在同名语义定义。
# ==============================================================
policy_path:
  allowed:
    # 基础单链策略。
    - "content_only"         # 仅内容链。

    # 强拒绝/弃权策略：内容链失败即 abstain，用于严格审计、压低 FPR。
    - "content_failed_abstain"

    # 论文级单一正式路径（v2.0 追加，append-only）
    # 单侧几何门控，无 fallback/proxy/sidecar。
    - "content_np_geo_rescue_v2"

    # ---- 已废弃（deprecated v2.0，formal_run_forbidden）----
    # 以下策略路径在 v2.0 论文正式路径收口后禁止用于正式 run；
    # 保留仅用于历史审计兼容，不可删除（append-only）。
    # - "content_with_geometry_gate"   # 旧组合策略，已被 content_np_geo_rescue_v2 取代
    # - "content_fallback_no_geometry" # 旧几何失败回退策略，已废弃

# ==============================================================
# CLI/运行期覆写允许集合
#   - 明确哪些字段允许被 CLI 覆写，或者由运行期参数覆盖 cfg。
#   - frozen_contracts 冻结“覆写机制与范围”。
#   - runtime_whitelist 明确“允许覆写的字段路径集合”与可选取值域。
#   - 覆写动作必须写入 records.override_applied 审计段，由 override_rules.py 统一生成。
# ==============================================================
override:
  # CLI 参数到字段路径的映射规则。
  # 语义约束（override_mode）冻结在 frozen_contracts.yaml，运行期允许集合在此。
  allowed_overrides:
    - arg_name: "enable_geometry"
      field_path: "detect.geometry.enabled"
      override_mode: "set"
      set_value: true
      source: "cli"
    - arg_name: "disable_geometry"
      field_path: "detect.geometry.enabled"
      override_mode: "set"
      set_value: false
      source: "cli"
    - arg_name: "enable_content_detect"
      field_path: "detect.content.enabled"
      override_mode: "set"
      set_value: true
      source: "cli"
      description: "实验矩阵：启用 content 检测（experiment_matrix 必需）"
    - arg_name: "disable_content_detect"
      field_path: "detect.content.enabled"
      override_mode: "set"
      set_value: false
      source: "cli"
      description: "实验矩阵：禁用 content 检测"
    - arg_name: "run_root_reuse_allowed"
      field_path: "allow_nonempty_run_root"
      override_mode: "set"
      source: "cli"
    - arg_name: "run_root_reuse_reason"
      field_path: "allow_nonempty_run_root_reason"
      override_mode: "set"
      source: "cli"
    - arg_name: "force_cpu"
      field_path: "device"
      override_mode: "set"
      set_value: "cpu"
      source: "cli"
      description: "CPU 优先闭环验证：强制设备为 CPU，用于审计与可复现性验证"
    - arg_name: "enable_paper_faithfulness"
      field_path: "paper_faithfulness.enabled"
      override_mode: "set"
      set_value: true
      source: "cli"
      description: "启用纸质对齐验证：启用 paper_faithfulness 模式、pipeline fingerprint 与 trajectory tap 必达"
    - arg_name: "enable_trace_tap"
      field_path: "trajectory_tap.enabled"
      override_mode: "set"
      set_value: true
      source: "cli"
      description: "启用轨迹采样：启用 trajectory tap 以产出可复算的轨迹摘要"
    - arg_name: "test_mode_identity"
      field_path: "embed.test_mode_identity"
      override_mode: "set"
      source: "cli"
      description: "测试模式基线检验：启用 identity 模式后 content/geometry 使用基线实现"
    
    # Ablation 实验开关 CLI overrides (append-only v1.0)
    # 允许通过 CLI 覆写 ablation.enable_* 开关，用于消融实验控制
    - arg_name: "ablation_enable_content"
      field_path: "ablation.enable_content"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 content 链开关"
    - arg_name: "ablation_disable_content"
      field_path: "ablation.enable_content"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 content 链（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_geometry"
      field_path: "ablation.enable_geometry"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 geometry 链开关"
    - arg_name: "ablation_disable_geometry"
      field_path: "ablation.enable_geometry"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 geometry 链（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_fusion"
      field_path: "ablation.enable_fusion"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 fusion 决策开关"
    - arg_name: "ablation_disable_fusion"
      field_path: "ablation.enable_fusion"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 fusion 决策（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_lf"
      field_path: "ablation.enable_lf"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 LF 低频通道开关"
    - arg_name: "ablation_disable_lf"
      field_path: "ablation.enable_lf"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 LF 低频通道（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_hf"
      field_path: "ablation.enable_hf"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 HF 高频通道开关"
    - arg_name: "ablation_disable_hf"
      field_path: "ablation.enable_hf"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 HF 高频通道（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_sync"
      field_path: "ablation.enable_sync"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 sync 模块开关"
    - arg_name: "ablation_disable_sync"
      field_path: "ablation.enable_sync"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 sync 模块（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_anchor"
      field_path: "ablation.enable_anchor"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写几何 anchor 开关"
    - arg_name: "ablation_disable_anchor"
      field_path: "ablation.enable_anchor"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用几何 anchor（传递 =false 强制禁用）"
    - arg_name: "ablation_enable_image_sidecar"
      field_path: "ablation.enable_image_sidecar"
      override_mode: "set"
      source: "cli"
      description: "Ablation：覆写 image sidecar 开关"
    - arg_name: "ablation_disable_image_sidecar"
      field_path: "ablation.enable_image_sidecar"
      override_mode: "set"
      allowed_values: [false]
      source: "cli"
      description: "Ablation：禁用 image sidecar（传递 =false 强制禁用）"
    
    # Experiment Matrix 实验网格必需参数覆写
    - arg_name: "seed"
      field_path: "seed"
      override_mode: "set"
      source: "cli"
      description: "实验矩阵：允许覆写随机种子用于可重复性实验网格"
    - arg_name: "model_id"
      field_path: "model_id"
      override_mode: "set"
      source: "cli"
      description: "实验矩阵：允许覆写模型 ID 用于多模型对比实验"
    - arg_name: "calibrate_detect_records_glob"
      field_path: "calibration.detect_records_glob"
      override_mode: "set"
      source: "cli"
      description: "实验矩阵：允许设置 calibrate 阶段的 detect 记录 glob 路径"
    - arg_name: "evaluate_detect_records_glob"
      field_path: "evaluate.detect_records_glob"
      override_mode: "set"
      source: "cli"
      description: "实验矩阵：允许设置 evaluate 阶段的 detect 记录 glob 路径"
    - arg_name: "evaluate_thresholds_path"
      field_path: "evaluate.thresholds_path"
      override_mode: "set"
      source: "cli"
      description: "实验矩阵：允许设置 evaluate 阶段的阈值工件路径"
    - arg_name: "allow_threshold_fallback_for_tests"
      field_path: "allow_threshold_fallback_for_tests"
      override_mode: "set"
      allowed_values: [true]
      source: "cli"
      description: "实验矩阵：detect 阶段允许阈值工件缺失时启用受控 fallback，仅用于生成后续 calibrate/evaluate 输入"
    - arg_name: "detect_calibration_artifact_path"
      field_path: "detect.calibration_artifact_path"
      override_mode: "set"
      source: "cli"
      description: "实验矩阵：允许设置 detect 阶段的 calibration 阈值工件路径，解决单图 detect NP 阈值注入不自足问题（P1-A）"

  # 覆写 source 的枚举白名单（gate 必须校验）
  source_enum:
    allowed:
      - "cli"
    immutable: true
    notes: "当前行为仅允许 CLI 来源覆写；若扩展来源，必须通过 whitelist_version 版本化变更。"

  # 覆写 arg_name 的枚举白名单（gate 必须校验）
  arg_name_enum:
    allowed:
      - "enable_geometry"
      - "disable_geometry"
      - "enable_content_detect"
      - "disable_content_detect"
      - "run_root_reuse_allowed"
      - "run_root_reuse_reason"
      - "force_cpu"
      - "enable_paper_faithfulness"
      - "enable_trace_tap"
      - "test_mode_identity"
      # Ablation 实验开关枚举（append-only v1.0）
      - "ablation_enable_content"
      - "ablation_disable_content"
      - "ablation_enable_geometry"
      - "ablation_disable_geometry"
      - "ablation_enable_fusion"
      - "ablation_disable_fusion"
      - "ablation_enable_lf"
      - "ablation_disable_lf"
      - "ablation_enable_hf"
      - "ablation_disable_hf"
      - "ablation_enable_sync"
      - "ablation_disable_sync"
      - "ablation_enable_anchor"
      - "ablation_disable_anchor"
      - "ablation_enable_image_sidecar"
      - "ablation_disable_image_sidecar"
      # Experiment Matrix 实验网格枚举
      - "seed"
      - "model_id"
      - "calibrate_detect_records_glob"
      - "evaluate_detect_records_glob"
      - "evaluate_thresholds_path"
      - "allow_threshold_fallback_for_tests"
      - "detect_calibration_artifact_path"  # P1-A 追加（v1.1）
    immutable: true
    notes: "必须与 allowed_overrides[*].arg_name 的值集完全一致。新增 override 必须同步更新此枚举。"

  # 一致性校验要求（gate 必须实现）
  consistency_check:
    arg_name_no_duplicates: true
    field_path_authorized: true
    override_applied_audit_required: true

# ==============================================================
# 运行期枚举允许集合
#   - 将若干关键枚举的允许值显式化为 allowlist，供 schema/records 校验与门禁使用。
#   - 这些枚举是“运行期选择集合”；新增取值必须通过版本化追加，不得原位改义。
#   - frozen_contracts 冻结“必须集中定义与必须验证”的机制。
#   - runtime_whitelist 给出“当前允许集合”，便于 gate 与审计脚本在无代码依赖下校验。
# ==============================================================
enums:

  # decoder_type：检测/融合端选择的解码器类型。
  decoder_type:
    allowed:
      - "content_correlation"
      - "geometry_correlation"
      - "fusion_neyman_pearson"

  # detect_method：检测方法类别。
  detect_method:
    allowed:
      - "content_correlation"
      - "geometry_correlation"

  # detect_feature：检测所用特征域。
  detect_feature:
    allowed:
      - "vae_latent_z"
      - "pixel_space"
      - "init_latent_diff"

  # pattern_type：pattern 生成类型。
  pattern_type:
    allowed:
      - "gaussian_iid"
      - "gaussian_iid_v1"
      - "rademacher"

  # mask_impl_id：语义掩码实现枚举（append-only）。
  mask_impl_id:
    allowed:
      - "semantic_saliency_v1"
      - "semantic_saliency_v2"
      - "texture_gradient_v1"

  # saliency_source：显著性来源策略枚举（append-only）。
  saliency_source:
    allowed:
      - "model_v2"
      - "auto_fallback"
      # ---- 已废弃（deprecated v2.0）----
      # - "proxy_v1"  # 代理显著性源，论文正式路径禁止使用

  # subspace_method：子空间规划相关枚举，表示“如何选子空间”。
  subspace_method:
    allowed:
      - "absent"
      - "grid_blocks"
      - "random_blocks"
  # subspace_source：子空间规划相关枚举，表示“子空间来自哪里”。
  subspace_source:
    allowed:
      - "absent"
      - "planner_computed"
      - "cfg_preset"

# ==============================================================
# impl_id allowlist
#   - 真实方法注入将通过 impl_id 扩展。
#   - 注入真实方法时，仅扩展此处 allowed_by_domain，不修改 frozen_contracts.yaml。
# ==============================================================
impl_id:

  # 运行期 gate 判定使用扁平化集合，语义分组仅用于审计展示。
  allowed_flat:
    # 语义掩码提供器（基础支撑，不依赖旧 paper-impl）
    - "semantic_mask_provider_v1"
    - "semantic_mask_provider_saliency_source_policy_v1"
    # Paper Faithfulness 模块 impl_id（append-only v1.0）
    - "sd3_pipeline_inspector_v1"
    - "sd3_diffusion_tracer_v1"
    - "injection_site_binder_v1"
    - "paper_alignment_evaluator_v1"
    # v2/v3 正式实现（唯一合规正式路径）
    - "high_freq_template_codec_v2"
    - "low_freq_template_codec_v2"
    - "unified_content_extractor_v2"
    - "subspace_planner_v2"
    - "attention_anchor_map_relation_v2"
    - "geometry_latent_sync_sd3_v3"
    - "fusion_neyman_pearson_v2"
    # ---- 已废弃 impl_id（deprecated v2.0，formal_run_forbidden，append-only 审计记录）----
    # - "content_baseline_identity_v1"         # 旧内容基线，已废弃
    # - "low_freq_coder_v1"                    # 旧 LF 基线，被 low_freq_template_codec_v2 取代
    # - "high_freq_coder_v1"                   # 旧 HF 基线，被 high_freq_template_codec_v2 取代
    # - "unified_latent_modifier_v1"           # 旧 latent 修改器，已废弃
    # - "content_detector_v1"                  # 旧内容检测器，被 unified_content_extractor_v2 取代
    # - "unified_content_extractor_v1"         # 旧统一提取器，被 v2 取代
    # - "geometry_attention_anchor_sd3_v1"     # 旧几何锚点，被 attention_anchor_map_relation_v2 取代
    # - "subspace_planner_v1"                  # 旧子空间规划器，被 v2 取代
    # - "subspace_planner_mask_conditioned_v1" # 旧 mask-conditioned 规划器，被 v2 取代
    # - "high_freq_template_codec_v1"           # 旧 HF embedder，被 v2 取代
    # - "low_freq_template_codec_v1"            # 旧 LF coder，被 v2 取代
    # - "attention_anchor_map_relation_v1"     # 旧关系提取器，被 v2 取代
    # - "geometry_latent_sync_sd3_v2"          # 旧 sync v2，被 v3 取代
    # - "fusion_neyman_pearson_v1"             # 旧 NP 融合，被 v2 取代
    # - "geometry_align_invariance_sd3_v1"     # 旧几何对齐，已完全退出
    # - "geometry_latent_sync_sd3_v1"          # 旧同步 v1，已完全退出
    # - "subspace_baseline_full_v1"            # 旧 subspace 基线，已完全退出

  allowed_by_domain:

    content_extractor:
      # 语义掩码提供器（基础支撑）
      - "semantic_mask_provider_v1"
      - "semantic_mask_provider_saliency_source_policy_v1"

      # v2/v3 正式实现（唯一合规路径）
      # - unified_content_extractor_v2：统一 Embed/Detect 双模式提取器。
      # - high_freq_template_codec_v2：HF 高频模板匹配嵌入，keyed Rademacher + 相关检测。
      # - low_freq_template_codec_v2：LF 低频伪高斯模板加性注入 + matched_correlation 检测。
      - "unified_content_extractor_v2"
      - "high_freq_template_codec_v2"
      - "low_freq_template_codec_v2"

    geometry_extractor:
      # v2 正式实现（唯一合规路径）
      # - attention_anchor_map_relation_v2：无 proxy，runtime self-attention 直接锚点，硬失败语义。
      - "attention_anchor_map_relation_v2"

    fusion_rule:
      # v2 正式实现（唯一合规路径）
      # - fusion_neyman_pearson_v2：NP 主控，geo 辅助，无 proxy 门控，单一决策出口。
      - "fusion_neyman_pearson_v2"

    subspace_planner:
      # v2 正式实现（唯一合规路径）
      # - subspace_planner_v2：带语义域注释的子空间规划器，detection_domain_spec 明确 higher_is_watermarked。
      - "subspace_planner_v2"

    sync_module:
      # v3 正式实现（唯一合规路径）
      # - geometry_latent_sync_sd3_v3：geo_score = template_match_score，无 quality_score 旁路。
      - "geometry_latent_sync_sd3_v3"

  # 是否允许出现未在 allowed_by_domain 中声明的 domain。
  # v1 阶段为 false。
  allow_unknown_domain: false

# ==============================================================
# 一致性与闭合校验规则
#   - 强制 runtime_whitelist 与 policy_path_semantics 的键空间闭合。
#   - 强制 records 必须记录 whitelist_version/whitelist_digest。
# ==============================================================
consistency_rules:
  policy_path_must_exist_in_semantics: true
  policy_path_semantics_must_be_subset_of_whitelist: false
  require_semantics_exact_cover: false
  override_field_paths_source: "override.allowed_overrides[*].field_path"
  
  # ---- Whitelist 层必须记录的字段集 ----
  records_must_include:
    - "whitelist_version"
    - "whitelist_digest"
    - "whitelist_file_sha256"
    - "whitelist_canon_sha256"
    - "whitelist_bound_digest"

  # ---- Policy Path Semantics 层必须记录的字段集（新增） ----
  policy_path_semantics_must_include:
    - "policy_path_semantics_version"
    - "policy_path_semantics_digest"
    - "policy_path_semantics_path"
    - "policy_path"
  policy_path_semantics_version_source: "configs/policy_path_semantics.yaml:policy_path_semantics_version"
  policy_path_semantics_digest_source: "configs/policy_path_semantics.yaml (canonical SHA256)"
  notes: "这四个字段必须由 freeze_gate 在写盘前一并校验，缺失任何字段均为 fail-fast。"
  paper_acceptance_require_template_codec_baseline: true

  # ---- Override 层的枚举校验（新增） ----
  override_source_validation:
    rule: "override.allowed_overrides[*].source 必须属于 override.source_enum.allowed"
    enforcement: "must_enforce"
    error_code: "whitelist_override_source_not_allowed"

  override_arg_name_validation:
    rule: "override.allowed_overrides[*].arg_name 必须属于 override.arg_name_enum.allowed"
    enforcement: "must_enforce"
    error_code: "whitelist_override_arg_name_not_allowed"

  override_arg_name_no_duplicates:
    rule: "override.allowed_overrides[*].arg_name 不允许重复，避免歧义"
    enforcement: "must_enforce"
    error_code: "whitelist_override_arg_name_duplicated"

  override_applied_audit_required:
    rule: "任何 override 被触发并应用时，必须在 records 中写入 override_applied 审计段"
    enforcement: "must_enforce"
    override_applied_minimum_fields:
      - "arg_name"
      - "field_path"
      - "source"
      - "override_mode"
      - "old_value"
      - "new_value"
    notes: "这些字段的取值必须与 whitelist 条目一致，且必须能从 records 单独审计出覆写事件。"

  # ---- Policy Path 三方一致性校验（新增） ----
  policy_path_closed_under_semantics:
    rule: "policy_path 必须同时满足：(1) 属于 policy_path.allowed；(2) 在 policy_path_semantics.yaml 中存在对应键"
    enforcement: "must_enforce"
    error_code: "policy_path_not_closed_under_semantics"

  policy_path_semantics_digest_consistency:
    rule: "records 中的 policy_path_semantics_digest 必须等于对 policy_path_semantics.yaml 的规范化 digest"
    enforcement: "must_enforce"
    error_code: "semantics_digest_mismatch"
    notes: "使用 frozen_contracts.yaml 定义的 canonical_digest 口径计算。"

  # ---- 强制闭合：policy_path_semantics 中的 record_fail_reason ----
  policy_path_semantics_record_fail_reason_in_frozen_fail_reason_enum:
    source_path_pattern: "policy_paths.*.on_chain_failure.*.record_fail_reason"
    target_values_from: "frozen_contracts.fail_reason_enum.allowed_values"
    enforcement: "must_enforce"
    description: "policy_path_semantics.yaml 中所有 record_fail_reason 的取值必须属于 frozen_contracts.yaml 的 fail_reason_enum.allowed_values，确保三份事实源闭合。"

  # 更新 versioning_policy 段（简化结构）
  versioning_policy:
    bump_required_if:
      - "allowed_enum_change"
      - "policy_path_mapping_change"
    rollback_policy:
      allow: "false"
      reason: "No rollback allowed in v1"
    forbidden_changes_in_place:
      - "enums.remove"
      - "policy_path.remove"
    audit_required_fields:
      - "whitelist_version"
      - "whitelist_bound_digest"

# ==============================================================
# Pipeline Realization Policy
#   - 控制真实 pipeline 构建的策略
#   - 定义允许的 model_source 和相关约束
# ==============================================================
pipeline_realization:
  enabled: true  # 启用真实 pipeline 支持
  allowed_model_sources:
    - "hf"       # 允许从 HuggingFace Hub 加载
    - "hf_hub"   # 允许从 HuggingFace Hub 加载（别名）
    - "local"    # 允许从本地路径加载
  hf_revision_required: true  # 要求指定 HF revision
  weights_snapshot_required: false  # 暂不强制要求 weights snapshot（便于开发调试）
  allowed_devices:
    - "cpu"
    - "cuda"
    - "mps"
  allowed_precisions:
    - "float32"
    - "float16"
    - "bfloat16"
  notes: "启用此策略后，才能使用 sd3_diffusers_real_v1 实现"
