# ==============================================================
# 策略路径语义映射
#   本文件是 policy_path 的“语义唯一来源”。
#   - 解释每个 policy_path 在系统层面意味着什么。
#   - 明确需要哪些证据链。
#   - 明确失败/缺失时如何降级。
#   - 明确对 records 的强制审计字段要求。
#   - runtime_whitelist.yaml 中 policy_path.allowed 的每个键，必须在本文件中存在同名条目。
#   - 若新增 policy_path，必须同步：
#     - runtime_whitelist.yaml 增加 allowed。
#     - 本文件补齐语义条目。
#     - scripts/tests 增加闭合一致性校验。
# ==============================================================

# 语义映射版本：用于 records 写入与 freeze_gate 校验。
# 与 frozen_contracts.yaml 中 policy_path_semantics_version 绑定
# 注：顶层仅保留 policy_path_semantics_version；不再使用 semantics_version（已移至 _artifact_audit）
# ==============================================================
policy_path_semantics_version: "v1.0"

# ==============================================================
# 0) 硬约束：必须满足的执行性规则
#   - 防止 policy_path_semantics 变成半文档半规则。
#   - 明确"运行期验证"与"静态审计"的边界。
#   - freeze_gate 与审计脚本必须严格执行此段规则。
# ==============================================================
hard_requirements:
  required_keys_per_policy_path:
    - "decoder_type"
    - "description"

  decoder_type_must_be_in_runtime_whitelist: true
  decoder_type_whitelist_source: "configs/runtime_whitelist.yaml:decoder_types.allowed"
  decoder_type_validation_rule: "每个 policy_path 条目的 decoder_type 值必须属于允许白名单，否则 freeze_gate 拒绝记录写入。"

  policy_path_keys_must_match_runtime_whitelist: true
  policy_path_whitelist_source: "configs/runtime_whitelist.yaml:policy_path.allowed"
  policy_path_validation_rule: |
    本文件 policy_paths 的键必须与 runtime_whitelist 的 policy_path.allowed 保持同步。
    若 runtime_whitelist 新增 policy_path，必须同时在本文件补齐语义定义，否则审计失败。

  field_catalog_paths_must_be_in_frozen_registry: true
  field_catalog_registry_source: "configs/frozen_contracts.yaml:records_schema.field_paths_registry"
  field_catalog_validation_rule: |
    field_catalog 中声明的所有字段路径必须出现在 frozen_contracts.yaml 的字段路径注册表中。
    若添加新字段，必须同时在 frozen_contracts.yaml 中注册，否则审计脚本报错。

  # ---- 高风险 1：语义驱动执行（防止"语义在 YAML，执行在代码分支"） ----
  semantic_driven_execution_required:
    enforcement: "recommended_enforce"
    requirement: |
      decision 层（融合决策入口）必须读取本文件对应 policy_path 的语义投射，并严格按照约束执行，禁止自行 if/else 处理：
        1) 若 required_chains 中的 chain 未启用或缺失证据，必须按 on_chain_failure 执行对应动作（failed/fallback/abstain），不可忽略
        2) 若 audit_obligations 指定的字段集缺失，必须将 status 置为 absent 或 failed，而不是静默忽略
        3) 禁止将本文件的约束降级为可选建议，必须强制执行
      目的：保证所有实现端对同一 policy_path 的行为完全一致，不因代码分支产生语义与执行不匹配。

  # 更新 versioning_policy 段（简化结构）
  # 声明性元信息，仅供审计脚本使用，不影响运行时逻辑。
  versioning_policy:
    bump_required_if:
      - "allowed_enum_change"
      - "policy_path_mapping_change"
    rollback_policy:
      allow: "false"
      reason: "No rollback allowed in v1"
    forbidden_changes_in_place:
      - "enums.remove"
      - "policy_path.remove"
    audit_required_fields:
      - "whitelist_version"
      - "whitelist_bound_digest"

# ------------------------------
# action 枚举（唯一权威）
# ------------------------------
action_enum:
  allowed:
    - "fallback"
    - "abstain"
    - "failed"
    - "not_applicable"

# ==============================================================
# 1) 全局语义约束
#   - 跨所有 policy_path 共享的语义规则或边界。
#   - 固化“可拒绝”与“可失败”语义边界。
#   - 固化 status 与 decision 的职责分离。
#   - 定义证据链失败/缺失的统一术语。
# ==============================================================
global_semantics:
  # status 与 decision 的职责边界。
  status_vs_decision:
    status_field: "status"
    decision_field: "decision.is_watermarked"
    rule: "status 不得用于表达最终水印判决；最终判决必须由 decision 字段表达。"
    notes:
      - "允许 status=failed 与 decision.is_watermarked=null 同时出现，用于表达“过程失败导致拒绝判决”。"
      - "status=mismatch/absent 表示输入或元数据不一致/缺失导致不可解释，通常应同步将 decision.is_watermarked 置为 null。"

  # rejectable 语义：允许在强攻击或缺失条件下“拒绝给出判决”以压低 FPR。
  rejectable_policy:
    supports_abstain: true
    abstain_representation:
      decision_field: "decision.is_watermarked"
      decision_value: null                  # 约定：null 表示拒绝给出最终判决。
    motivation: "在强攻击或关键证据链不可用时，允许提高 FNR 以压低 FPR，并保持审计可靠性。"

  # 证据链失败/缺失的统一术语。
  failure_taxonomy:
    content_fail_status: "failed"           # 内容链内部异常或证据计算失败。
    geometry_fail_status: "failed"          # 几何链内部异常。
    missing_inputs_status: "absent"         # 输入缺失导致不可执行。
    metadata_mismatch_status: "mismatch"    # 元数据不一致。
# ==============================================================
# 2) 字段路径注册表
#   - 将 policy_path 语义引用的字段路径集中声明。
#   - 为“必需字段 vs 建议字段”提供分层规范。
#     - core_required：框架级必需字段。缺失必须导致不可解释。
#     - path_required：仅在特定 policy_path 或特定链路启用条件下必需。缺失必须触发降级或不可解释。
#     - recommended：缺失不阻断，但若存在则必须通过格式与枚举校验。
#   - 避免未来落地 schema 时出现隐式契约与语义漂移。
# ==============================================================
field_catalog:
  catalogs:
    core_required:
      # 基本运行与冻结锚点：用于证明实验可比性与冻结一致性。
      - "policy_path"
      - "cfg_digest"
      - "impl.content_extractor_id"
      - "impl.geometry_extractor_id"
      - "impl.fusion_rule_id"
      - "thresholds_digest"
      - "decision.is_watermarked"
      - "contract_version"
      - "contract_digest"
      - "contract_file_sha256"
      - "contract_canon_sha256"
      - "contract_bound_digest"
      - "whitelist_version"
      - "whitelist_digest"
      - "whitelist_file_sha256"
      - "whitelist_canon_sha256"
      - "whitelist_bound_digest"
      - "policy_path_semantics_version"
      - "policy_path_semantics_digest"
      - "policy_path_semantics_file_sha256"
      - "policy_path_semantics_canon_sha256"
      - "policy_path_semantics_bound_digest"
      # 判决与过程状态：最小闭环字段。
      - "status"
      - "decision.is_watermarked"

    # 内容证据链启用时的最小证据字段。
    content_minimal:
      - "content_evidence.status"
      - "content_evidence.score"

    # 几何 gate 启用时的最小字段。
    geometry_gate_minimal:
      - "geometry_evidence.sync.status"

    # 推荐审计字段（可选）。
    recommended:
      - "content_evidence.fail_reason"
      - "score_audit.content_score_used"
      - "geometry_evidence.sync.reason"
      - "score_audit.geometry_gate_used"
      - "score_audit.geometry_fallback_triggered"
      - "score_audit.fusion_rule_used"
      - "decision.abstain_reason"
      - "score_audit.abstain_triggered_by"
      - "content_evidence.subspace_binding_digest"
      - "content_evidence.lf_statistics_digest"
      - "content_evidence.hf_statistics_digest"

# ------------------------------
# catalogs 使用约束
# ------------------------------
catalogs_usage_rules:
  rule: "catalogs 仅包含字段集合；是否强制由 audit_obligations.path_required_fields 的 condition 决定。"
  recommended_policy:
    gate_behavior: "recommended 不进入 gate 强制校验，仅用于报表与审计参考。"
    condition_hint: "recommended 不应被配置为强制条件。"

# ------------------------------
# score_audit 字段命名约束
# ------------------------------
score_audit_naming_rules:
  single_score_field: "score_audit.content_score_used"
  multi_score_field: "score_audit.content_scores_used"
  rule: "单一得分使用单数，多个得分列表使用复数，避免同义字段。"

# ------------------------------
# condition 枚举与判定来源
# ------------------------------
condition_enum:
  allowed:
    - "always"
    - "when_chain_enabled"
  when_chain_enabled_source:
    rule: "读取 records 中的链路启用事实字段。"
    fields_from: "configs/frozen_contracts.yaml:records_schema.chain_enablement_fields"

# ==============================================================
# 3) policy_path 语义映射表
#   - 每个 policy_path 条目应包含：
#     - decoder_type：语义解码器类型。
#     - required_chains：必需证据链。
#     - optional_chains：可选证据链。
#     - on_chain_failure：链路失败时的降级策略。
#     - audit_obligations：该策略必须写入 records 的审计字段。
# ==============================================================
policy_paths:

  # ------------------------------
  # content_only：仅内容链。
  # ------------------------------
  content_only:
    decoder_type: "content_correlation"     # 语义解码器类型：内容相关性统计。
    description: "Content-only evidence path"

    required_chains:
      content: true
      geometry: false
    optional_chains:
      geometry: false

    # 链路失败语义：
    on_chain_failure:
      content:
        # content 失败：允许返回 failed 或 abstain。
        action: "failed"                    # content 失败时：status=failed。
        set_decision_to: null               # 同时可将 decision 置为 null 表示拒绝判决。
        record_fail_reason: "evidence_computation_failed"
      geometry:
         # geometry 不参与：不应出现 geometry 相关审计字段的强制要求。
        action: "not_applicable"

    audit_obligations:
      # 框架级必需字段：必须存在，否则 status=absent。
      record_fields_level: "core_required"

      # 路径级必需字段：仅当本 policy_path 对应链路启用时强制。
      path_required_fields:
        # content_only 必须具备内容链最小证据字段。
        content:
          catalog: "content_minimal"
          condition: "always"

      # 建议字段：缺失不阻断，但若存在应校验其格式与枚举合法性。
      recommended_fields:
        # content_only 推荐记录内容链失败原因与 score 使用情况。
        - "content_evidence.fail_reason"
        - "score_audit.content_score_used"

  # ------------------------------
  # content_with_geometry_gate：内容证据为主，几何链提供显式同步门禁。
  # ------------------------------
  content_with_geometry_gate:
    decoder_type: "fusion_neyman_pearson"   # 语义：最终判决遵循 NP 范式融合。
    description: "Content with geometry gate"

    required_chains:
      content: true
      geometry: false                       # geometry 不作为必需证据输入，但作为 gate 可选启用。
    optional_chains:
      geometry: true

    # 几何门禁语义：
    geometry_gate:
      enabled: true
      # gate_field 一旦启用，应视为路径级必需字段，且必须记录 gate 的状态与失败原因。
      gate_field: "geometry_evidence.sync.status"
      success_value: "ok"
      failure_values: ["failed", "absent", "mismatch"]
      
      # gate 失败的默认策略：fallback 到 content_only。
      # 若希望 gate 失败直接 abstain，可将 action 改为 abstain，并设置 set_decision_to=null。
      on_failure:
        action: "fallback"                  # fallback / abstain / failed 三选一。
        fallback_policy_path: "content_only"
        set_decision_to: null
        record_fail_reason_if_failed: "inversion_failed"

    on_chain_failure:
      content:
        action: "failed"
        set_decision_to: null
        record_fail_reason: "evidence_computation_failed"
      geometry:
        # 具体行为由 geometry_gate.on_failure 决定。
        action: "fallback"

    audit_obligations:
      record_fields_level: "core_required"
      path_required_fields:
        content:
          catalog: "content_minimal"
          condition: "always"
        geometry:
          catalog: "geometry_gate_minimal"
          condition: "when_chain_enabled"
      recommended_fields:
        - "geometry_evidence.sync.reason"
        - "score_audit.content_score_used"
        - "score_audit.geometry_gate_used"
        - "score_audit.fusion_rule_used"
        - "score_audit.geometry_fallback_triggered"

  # ------------------------------
  # content_fallback_no_geometry：显式允许几何不可用时显式回退为 content_only。
  # ------------------------------
  content_fallback_no_geometry:
    decoder_type: "fusion_neyman_pearson"
    description: "Fallback when geometry is unavailable"

    required_chains:
      content: true
      geometry: false
    optional_chains:
      geometry: true

    geometry_gate:
      enabled: true
      gate_field: "geometry_evidence.sync.status"
      success_value: "ok"
      failure_values: ["failed", "absent", "mismatch"]
      
      on_failure:
        action: "fallback"
        fallback_policy_path: "content_only"
        set_decision_to: null

    on_chain_failure:
      content:
        action: "failed"
        set_decision_to: null
        record_fail_reason: "evidence_computation_failed"
      geometry:
        action: "fallback"

    audit_obligations:
      record_fields_level: "core_required"
      path_required_fields:
        content:
          catalog: "content_minimal"
          condition: "always"
        geometry:
          catalog: "geometry_gate_minimal"
          condition: "when_chain_enabled"
      recommended_fields:
        - "geometry_evidence.sync.reason"
        - "score_audit.geometry_fallback_triggered"
        - "score_audit.fusion_rule_used"
        - "score_audit.content_score_used"

  # ------------------------------
  # content_failed_abstain：内容链失败即拒绝判决，显式化拒绝语义。
  # ------------------------------
  content_failed_abstain:
    decoder_type: "fusion_neyman_pearson"
    description: "Abstain when content evidence fails"

    required_chains:
      content: true
      geometry: false
    optional_chains:
      geometry: false

    on_chain_failure:
      content:
        action: "abstain"                   # 明确：内容链失败不输出判决。
        set_status_to: "failed"             # 过程状态仍应标记为 failed。
        set_decision_to: null               # 决策置 null 表示 abstain。
        record_fail_reason: "evidence_computation_failed"
      geometry:
        action: "not_applicable"

    audit_obligations:
      record_fields_level: "core_required"
      path_required_fields:
        content:
          catalog: "content_minimal"
          condition: "always"
      recommended_fields:
        - "decision.abstain_reason"
        - "score_audit.abstain_triggered_by"
        - "content_evidence.fail_reason"

# ==============================================================
# 4) 软建议：非强制的审计参考
#   - 为"闭合一致性检查"提供参考框架。
#   - 硬约束规则已在 hard_requirements 中明确定义。
#   - 此段仅作审计脚本参考提示，不作为 gate 强制条件。
# ==============================================================
soft_recommendations:
  # 结构化一致性参考：审计脚本可检查的闭合要点。
  suggested_closure_checks:
    - check: "whitelist_policy_paths_subset_of_semantics_keys"
      source_file: "configs/runtime_whitelist.yaml"
      source_path: "policy_path.allowed"
      target_file: "configs/policy_path_semantics.yaml"
      target_path: "policy_paths"
      rule: "set(source) ⊆ set(target.keys())"
      description: "建议验证：runtime_whitelist 中 allowed 的 policy_path 在 policy_paths 中是否都有对应的语义定义。"

  records_audit_fields:
    - "policy_path_semantics_version"
    - "policy_path_semantics_digest"
    - "policy_path_semantics_file_sha256"
    - "policy_path_semantics_canon_sha256"
    - "policy_path_semantics_bound_digest"

  optional_audit_enrichment:
    - field: "geometry_evidence.sync.status"
      suggestion: "当 geometry 在 policy_path 中配置为可选时，建议记录其状态用于审计分析"
    - field: "decision.abstain_reason"
      suggestion: "当 decision.is_watermarked 为 null 时，建议记录弃权理由以增强可解释性"
