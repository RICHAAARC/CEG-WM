  # ==============================================================
  # Paper Faithfulness detect 侧一致性验证扩展（append-only v1.0）
  # - 结构化 failure semantics：absent_reasons / mismatch_reasons / fail_reasons
  # - status 为 "ok" 时，所有 reasons 数组为空列表
  # - status 为 "absent" 时 absent_reasons 必须非空
  # - status 为 "mismatch" 时 mismatch_reasons 必须非空
  # - status 为 "fail" 时 fail_reasons 必须非空
  # ==============================================================
  - path: "paper_faithfulness.status"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "paper faithfulness 一致性验证状态（ok/absent/mismatch/fail）。"
  
  - path: "paper_faithfulness.absent_reasons"
    layer: "diagnostic"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "paper faithfulness 证据缺失原因列表（必须非空当 status='absent'）。"
  
  - path: "paper_faithfulness.mismatch_reasons"
    layer: "diagnostic"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "paper faithfulness 证据不一致原因列表（必须非空当 status='mismatch'）。"
  
  - path: "paper_faithfulness.fail_reasons"
    layer: "diagnostic"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "paper faithfulness 验证失败原因列表（必须非空当 status='fail'）。"

  - path: "plan_input_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "embed 侧 plan 输入锚点摘要。"

  - path: "plan_input_schema_version"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "plan 输入锚点口径版本。"

  - path: "input_sha256"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "embed 输入图像文件摘要。"

  - path: "artifact_sha256"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "embed 输出工件文件摘要。"

  - path: "embed_trace"
    layer: "diagnostic"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "embed 基线身份标记字段（防止误当真实嵌入参数）。"

  - path: "embed_trace.identity_mode"
    layer: "diagnostic"
    type: "boolean_flag"
    required: false
    missing_semantics: "absent_ok"
    description: "embed 基线身份模式标记。"

  - path: "embed_trace.identity_reason"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "embed 基线身份模式原因枚举。"

  - path: "plan_digest_expected"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧输入绑定记录中的期望 plan 摘要。"

  - path: "plan_digest_observed"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧观测到的 plan 摘要。"

  - path: "plan_digest_status"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧 plan 摘要一致性状态（ok/mismatch/absent）。"

  - path: "calibration_mode"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "calibration 侧运行模式（real）。"

  - path: "calibration_is_fallback"
    layer: "diagnostic"
    type: "boolean_flag"
    required: false
    missing_semantics: "absent_ok"
    description: "calibration 侧回退标记（由 calibration_mode 派生）。"

  - path: "evaluation_mode"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "evaluation 侧运行模式（real）。"

  - path: "evaluation_is_fallback"
    layer: "diagnostic"
    type: "boolean_flag"
    required: false
    missing_semantics: "absent_ok"
    description: "evaluation 侧回退标记（由 evaluation_mode 派生）。"

  - path: "detect_runtime_mode"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧运行模式（real/fallback_identity_v0）。"

  - path: "detect_runtime_status"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧运行状态（active/fallback）。"

  - path: "detect_runtime_is_fallback"
    layer: "diagnostic"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧兼容字段：是否处于回退模式（由 detect_runtime_mode 派生）。"
