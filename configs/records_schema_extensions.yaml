  - path: "content_evidence.hf_statistics_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "检测侧 HF 同构统计摘要。"
  - path: "content_evidence.hf_evidence_summary"
    layer: "diagnostic"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
