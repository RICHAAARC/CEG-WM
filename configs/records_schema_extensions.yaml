    description: "子空间基摘要一致性状态（consistent/mismatch/absent）。"
  
  - path: "content_evidence.detect_lf_statistics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧 LF 统计向量（系数范数、均值、标差等）。"
  
  - path: "content_evidence.detect_hf_statistics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧 HF 统计向量（系数范数、均值、标差等）。"
  
  - path: "content_evidence.subspace_consistency_status"
