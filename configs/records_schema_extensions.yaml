  - path: "decision.used_threshold_id"
    layer: "routing"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "使用的阈值标识。"
  - path: "decision.routing_decisions"
    layer: "routing"
    type: "routing_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "路由决策明细（启停原因与链路选择）。"
  - path: "decision.routing_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "路由决策摘要。"
  - path: "routing_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "content 链派生路由摘要（embed 顶层锚点）。"
  - path: "routing_summary"
    layer: "routing"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "content 链派生最小路由统计（embed 顶层字段）。"
  - path: "mask_resolution_binding"
    layer: "anchor"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "掩码分辨率绑定（embed 顶层字段）。"
  - path: "mask_source_impl_identity"
    layer: "anchor"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "掩码来源实现身份（embed 顶层字段）。"
  - path: "decision.conditional_fpr_notes"
    layer: "routing"
    type: "routing_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "条件 FPR 口径说明与统计锚点。"

  # ==============================================================
  # S-10 融合规则真实实现（Neyman-Pearson 主控 + 几何辅助）
  # ==============================================================
  - path: "decision.fusion_rule_digest"
    layer: "routing"
    type: "str"
    required: false
    missing_semantics: "absent_ok"
    description: "融合规则参数摘要：encoding(impl_id, impl_version, np_threshold, target_fpr, rescue_band_version, geo_gate_applied)。"
  - path: "decision.rescue_band_version"
    layer: "routing"
    type: "str"
    required: false
    missing_semantics: "absent_ok"
    description: "Rescue band 机制版本标记（仅当几何增益被应用时非空）。"
  - path: "decision.geo_gate_applied"
    layer: "routing"
    type: "bool_or_null"
    required: false
    missing_semantics: "absent_ok"
    description: "几何门控是否应用标志。"

  # ==============================================================
  # detect 侧同构统计信号（论文级检测闭环）
  # ==============================================================
  - path: "content_evidence.detect_lf_score"
    layer: "diagnostic"
    type: "score_float"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧 LF 子空间同构得分（范围 [0, 1]）。"
  
  - path: "content_evidence.detect_hf_score"
    layer: "diagnostic"
    type: "score_float"
    required: false
    missing_semantics: "absent_ok"
    description: "detect 侧 HF 子空间同构得分（范围 [0, 1]）。"
  
  - path: "content_evidence.lf_score_drift_status"
