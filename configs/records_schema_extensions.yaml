  - path: "content_evidence.score_parts"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "结构化分解得分（可包含 lf_score、hf_score 等）。"
  - path: "content_evidence.content_failure_reason"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "内容链失败原因（字符串枚举）。"
  - path: "content_evidence.content_mismatch_reason"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
