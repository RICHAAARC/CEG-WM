  - path: "geometry_evidence.align_metrics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "几何对齐统计摘要（关系一致率、邻接保持率、残差分位等）。"
  - path: "geometry_evidence.align_config_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
