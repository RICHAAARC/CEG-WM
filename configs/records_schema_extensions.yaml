# ==============================================================
# Records schema extensions
# - 仅追加字段，默认允许 absent。
# - 本文件作为接口层字段事实源，用于审计与字段登记对齐。
# ==============================================================
version: "v1"
append_only: true

type_definitions:
  digest_hex64: "64 字符小写十六进制 sha256 摘要。"
  metrics_dict: "JSON-like 的指标映射。"
  score_float: "非负数值（int 或 float）。"
  routing_dict: "JSON-like 的路由决策映射。"
  reason_string: "非空字符串，用于失败原因。"
  json_dict: "JSON-like 的映射。"
  boolean_flag: "布尔标记字段（true/false）。"

fields:
  - path: "content_evidence.mask_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "语义掩码摘要（可复算锚点）。"
  - path: "content_evidence.mask_stats"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "掩码统计指标（面积占比、连通域数量等）。"
  - path: "content_evidence.mask_stats.mask_resolution_binding"
    layer: "anchor"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "掩码分辨率绑定信息（height/width/channels）。"
  - path: "content_evidence.mask_stats.mask_source_impl_identity"
    layer: "anchor"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "掩码来源实现身份（impl_id/impl_version/impl_digest）。"
  - path: "content_evidence.mask_stats.mask_params_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "掩码参数摘要（mask_params 的 canonical sha256）。"
  - path: "content_evidence.mask_stats.routing_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "由掩码统计派生的最小路由摘要。"
  - path: "content_evidence.mask_stats.routing_summary"
    layer: "routing"
    type: "json_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "由掩码统计派生的最小路由统计摘要。"
  - path: "content_evidence.plan_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "内容链计划摘要（与 cfg_digest 区分）。"
  - path: "content_evidence.basis_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "子空间基摘要。"
  - path: "content_evidence.lf_trace_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "低频注入痕迹摘要。"
  - path: "content_evidence.hf_trace_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "高频注入痕迹摘要。"
  - path: "content_evidence.injection_trace_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "注入痕迹摘要。"
  - path: "content_evidence.injection_params_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "注入参数摘要。"
  - path: "content_evidence.lf_score"
    layer: "diagnostic"
    type: "score_float"
    required: false
    missing_semantics: "absent_ok"
    description: "低频分区得分。"
  - path: "content_evidence.hf_score"
    layer: "diagnostic"
    type: "score_float"
    required: false
    missing_semantics: "absent_ok"
    description: "高频分区得分。"
  - path: "content_evidence.injection_status"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "注入状态（ok/absent/failed/mismatch）。"
  - path: "content_evidence.injection_absent_reason"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "注入缺失原因。"
  - path: "content_evidence.injection_failure_reason"
    layer: "diagnostic"
    type: "reason_string"
    required: false
    missing_semantics: "absent_ok"
    description: "注入失败原因。"
  - path: "content_evidence.injection_metrics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "注入统计指标摘要。"
  - path: "content_evidence.subspace_binding_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "注入期运行子空间绑定摘要。"
  - path: "content_evidence.lf_statistics_digest"
