    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "注意力锚点摘要。"
  - path: "geometry_evidence.anchor_metrics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "注意力锚点稳定性指标。"
  - path: "geometry_evidence.anchor_config_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
