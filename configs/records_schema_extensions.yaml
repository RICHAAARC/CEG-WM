  - path: "geometry_evidence.sync_metrics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "同步质量指标。"
  - path: "geometry_evidence.sync_config_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
    missing_semantics: "absent_ok"
    description: "同步模板配置输入域摘要。"
  - path: "geometry_evidence.sync_quality_metrics"
    layer: "diagnostic"
    type: "metrics_dict"
    required: false
    missing_semantics: "absent_ok"
    description: "同步质量指标（命名收敛字段）。"
  - path: "geometry_evidence.align_trace_digest"
    layer: "anchor"
    type: "digest_hex64"
    required: false
