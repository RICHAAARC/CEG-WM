# ==============================================================
# 配置角色：records schema 追加字段事实源
# - 本文件以 append-only 方式登记 records 可写字段与缺失语义。
# - 用于 schema 审计、字段注册一致性与门禁对齐。
# - 本文件不是 workflow 运行配置，不承载模型或推理参数。
# ==============================================================

version: "v14"  # v3→v4 (2026-03-12)：formal path 最终闭包收口；historical_fields: 段已从当前 formal schema 文件移除，旧字段信息不再显式保留在任何 formal 文件中。当前 formal schema 只表达当前正式机制。v4→v5 (2026-03-13)：追加 attestation 事件绑定、真实性/图像证据双层语义与 event-attested 判决字段。v5→v6 (2026-03-13)：追加 geometry recovery observations、observed correspondences 与 recovered consistency 字段。v6→v7 (2026-03-13)：追加 coarse registration 与 recovered-domain sync revalidation 细分字段。v7→v8 (2026-03-14)：追加 LF canonical evidence summary 字段登记。v8→v9 (2026-03-16)：追加 negative branch attestation provenance 的 append-only 诊断字段登记。v9→v10 (2026-03-17)：追加 attestation_source 字段并冻结 statement-only provenance 的受控 no-bundle 语义。v10→v11 (2026-03-19)：追加 exact LF observability 字段与 detect runtime canonical 兼容命名字段。v11→v12 (2026-03-20)：收口 detect runtime mode 当前正式合同描述。v12→v13 (2026-03-20)：移除 detect runtime 历史旧值名在当前 schema 正文中的残留，正式合同仅保留 real / fallback_identity。v13→v14 (2026-03-26)：追加 content_chain_score、lf_channel_score、lf_correlation_score 及 attestation LF 桥接字段登记。
append_only: true

type_definitions:
  digest_hex64: "64 字符小写十六进制 sha256 摘要。"
  metrics_dict: "JSON-like 的指标映射。"
  score_float: "非负数值（int 或 float）。"
  routing_dict: "JSON-like 的路由决策映射。"
  reason_string: "非空字符串，用于失败原因。"
  json_dict: "JSON-like 的映射。"
  boolean_flag: "布尔标记字段（true/false）。"

