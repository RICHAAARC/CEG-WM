    - content_evidence.content_mismatch_field_path
    - content_evidence.audit.trajectory_tap_status
    - content_evidence.audit.trajectory_absent_reason
    - content_evidence.trajectory_evidence
    - content_evidence.trajectory_evidence.status
    - content_evidence.trajectory_evidence.trajectory_spec
    - content_evidence.trajectory_evidence.trajectory_spec_digest
    - content_evidence.trajectory_evidence.trajectory_digest
    - content_evidence.trajectory_evidence.trajectory_metrics
    - content_evidence.trajectory_evidence.trajectory_stats
    - content_evidence.trajectory_evidence.trajectory_absent_reason
    - content_evidence.trajectory_evidence.trajectory_tap_version
