# ==============================================================
# Impl Identity Binding
#   - impl 身份冻结：绑定 whitelist 允许集合与 records 字段路径。
#   - field_paths_by_domain 定义每个 domain 对应的 records 字段路径。
#   - 后续版本的方法注入只能改变 impl.*_id 值，gate 必须验证值属于 whitelist 对应 domain 的 allowed 集合。
# ==============================================================
impl_identity:               # impl 身份绑定契约；freeze_gate._validate_impl_identity_fields 按域校验。
  required: true             # true 表示 impl 身份锚点为硬必填。

  # ---- domain 与 records 字段路径的映射冻结 ----
  # 必须与 runtime_whitelist.yaml 中 impl_id.allowed_by_domain 的 key 完全对齐。
  field_paths_by_domain:                    # 域到 records 字段路径映射（用于 impl_id 按域校验）。
    content_extractor: "impl.content_extractor_id"
    geometry_extractor: "impl.geometry_extractor_id"
    fusion_rule: "impl.fusion_rule_id"
    subspace_planner: "impl.subspace_planner_id"
    sync_module: "impl.sync_module_id"

  # ---- 按域拆分的版本与摘要字段 ----
  version_field_paths_by_domain:            # 域到 impl.versions.* 路径映射（版本差异定位）。
    content_extractor: "impl.versions.content_extractor"
    geometry_extractor: "impl.versions.geometry_extractor"
    fusion_rule: "impl.versions.fusion_rule"
    subspace_planner: "impl.versions.subspace_planner"
    sync_module: "impl.versions.sync_module"

  digest_field_paths_by_domain:             # 域到 impl.digests.* 路径映射（实现摘要差异定位）。
    content_extractor: "impl.digests.content_extractor"
    geometry_extractor: "impl.digests.geometry_extractor"
    fusion_rule: "impl.digests.fusion_rule"
    subspace_planner: "impl.digests.subspace_planner"
    sync_module: "impl.digests.sync_module"

  # ---- 验证规则 ----
  validation_rule:
    任何 records 写出时，must_present impl.*_id、impl.versions.*、impl.digests.* 字段，且：
    1) impl.*_id 值必须属于 runtime_whitelist.yaml 的 impl_id.allowed_by_domain 对应 domain 集合
    2) impl.versions.* 必须为非空字符串，且必须匹配正则：^[A-Za-z0-9_.-]{1,64}$
    3) impl.digests.* 必须为 64 位小写十六进制字符串
    - freeze_gate 在写盘前执行此验证，失败则拒绝写入
    - 按域拆分保证单因素变化（仅特定 domain 的 impl 改变）可完全审计定位

# ==============================================================
# Status / Fail / Mismatch Enum
#   - 核心失败语义坐标系冻结。
#   - status 表达“检测过程状态”，不是最终水印判决。
#   - 最终判决必须使用 decision.is_watermarked 等独立字段，严禁复用 status。
# ==============================================================
status_enum:                 # 过程状态枚举（不是最终判决）。
  allowed_values: ["ok", "failed", "mismatch", "absent"]  # 同类差异：ok=流程完成；failed=执行失败；mismatch=与生成元数据不一致；absent=输入缺失。
  definitions:
    ok: "检测完成，无异常"                          # 流程成功完成且无失败/冲突语义。
    failed: "检测过程发生异常或逻辑错误，具体原因见 fail_reason"    # 执行失败语义，原因由 fail_reason 枚举限定。
    mismatch: "检测与生成元数据不一致，具体原因见 mismatch_reason"  # 一致性冲突语义，原因由 mismatch_reason 枚举限定。
    absent: "检测输入缺少必需字段，无法执行检测"             # 输入缺失语义，表示前置条件不足而非算法失败。
  immutable: true
  notes: "此字段严禁改名、重定义语义。若需表达最终水印判决，使用 decision.is_watermarked，不得复用 status。"

fail_reason_enum:            # status==failed 时的原因枚举（运行失败语义）。
  allowed_values:
    - "missing_required_field"              # 缺少检测必需输入字段，流程无法继续。
    - "pattern_seed_mismatch"               # pattern seed 与期望值不一致。
    - "subspace_frame_mismatch"             # 子空间 frame 与预期不一致（执行期失败语义）。
    - "cfg_digest_mismatch"                 # 有效配置摘要与记录不一致。
    - "inversion_failed"                    # 逆过程/反演步骤执行失败。
    - "trace_extraction_failed"             # trace 提取阶段失败。
    - "evidence_computation_failed"         # 证据计算阶段失败。
    - "decoder_error"                       # 解码器执行异常或输出非法。
    - "unknown"                             # 未归类失败（仅兜底，建议减少使用）。
  usage: "仅在 status == 'failed' 时填充"
  immutable: true

mismatch_reason_enum:        # status==mismatch 时的原因枚举（一致性冲突语义）。
  allowed_values:
    - "subspace_frame_mismatch"             # 子空间 frame 与生成侧记录不一致（一致性冲突）。
    - "cfg_digest_mismatch"                 # cfg_digest 与生成侧记录不一致。
    - "plan_digest_mismatch"                # 计划摘要与记录不一致。
    - "basis_digest_mismatch"               # 基函数/基底摘要不一致。
    - "planner_impl_identity_mismatch"      # planner 实现身份（id/version/digest）不一致。
    - "trajectory_spec_digest_mismatch"     # trajectory 规格摘要不一致。
    - "trajectory_digest_mismatch"          # trajectory 实例摘要不一致。
    - "trajectory_evidence_invalid"         # trajectory 证据结构存在缺失或非法。
  usage: "仅在 status == 'mismatch' 时填充"
  immutable: true

# ==============================================================
# Output Directory Naming
#   - 输出目录命名与解析口径冻结。
#   - 禁止手写 split/regex 解析目录名，必须委托 output_naming 模块。
#   - policy_path 集合由 validator 委托 runtime_whitelist 校验。
# ==============================================================
output_dir_naming:           # 当前主链路未直接消费本段，主要作为契约说明与审计提示（contracts.py 未解析该段）。
  canonical_module: "main.policy.path_policy"    # 唯一输出路径决策层。
  frozen_format: "cfg_<cfg_digest>_key_<key>_policy_<policy_path>"   # 目录名冻结模板。
  field_spec:
    cfg_digest:
      type: "hex64"                              # 字段类型：64 位十六进制摘要。
      source: "cfg 参数的 canonical_digest（通过 canonical_json / canonical_digest）"
      escapable: false                           # 不允许转义编码，需原样写入。
    key:
      type: "policy_id"                          # 字段类型：策略标识符。
      regex: "^(?!.*_key_)(?!.*_policy_)[A-Za-z0-9_]+$"   # 合法 key 正则约束。
      source: "policy 定义的 policy_id"
      escapable: false                           # 不允许转义编码，避免解析歧义。
      note: "不允许含 '_key_' 或 '_policy_' 子串，以避免与固定分隔符冲突"
    policy_path:
      type: "path"                               # 字段类型：策略路径枚举值。
      source: "融合策略 policy_path 枚举值（与 policy_path_semantics 对齐）；records 中存放解码后的明文枚举值"
      escaping: "base64url_no_padding"           # 编码规则：base64url 且无 '=' padding。
      note: "不得包含 '=' padding；编码端必须输出无 padding 格式。"
  stable_fields_in_records: ["cfg_digest", "key", "policy_path"]     # records 中必须稳定存在的目录名解码字段。
  delegation_rule: "所有目录名生成与解析必须唯一通过 output_naming 模块，禁止手写 split/regex。"
  contract_source: "此规则来自 configs/frozen_contracts.yaml，禁止任意 contract_path 参数绕过。"
  decoder_enum:
    allowed: ["raw", "base64url_no_padding"]     # 支持的解码器枚举：raw=直读；base64url_no_padding=URL 安全 base64 且无 '='。
  parsing_rule:
    format_regex: "^cfg_([0-9a-f]{64})_key_((?!.*_key_)(?!.*_policy_)[A-Za-z0-9_]+)_policy_([a-zA-Z0-9_-]+)$"
    field_extractors:
      cfg_digest:
        group_index: 1                           # 正则捕获组索引：第1组。
        decoder: "raw"                           # 该组无需二次解码。
        validator: "hex64"                       # 必须是 64 位十六进制摘要。
      key:
        group_index: 2                           # 正则捕获组索引：第2组。
        decoder: "raw"                           # 该组无需二次解码。
        validator: "policy_id_format"            # 必须满足 policy_id 命名约束。
      policy_path:
        group_index: 3                           # 正则捕获组索引：第3组。
        decoder: "base64url_no_padding"          # 该组按 base64url 无 padding 反解。
        validator: "policy_path_in_whitelist"    # 实际允许集合来自 runtime_whitelist.yaml。
        note: "decoder 必须按 base64url_no_padding 解释；输入不得含 '='。"

# ==============================================================
# Threshold Management
#   - 阈值管理口径冻结：Neyman–Pearson 统计锚点冻结。
#   - 所有与阈值相关的功能必须通过 canonical_module 定义的接口访问，禁止各模块自行实现阈值选择、加载、验证逻辑。
#   - thresholds_digest 与 threshold_metadata_digest 是可比性的关键锚点。
# ==============================================================
threshold_management:        # 当前主链路未直接消费本段，同名函数存在于 neyman_pearson.py，供实现与审计对齐。
  canonical_module: "main.watermarking.fusion.neyman_pearson"        # neyman_pearson.py 统一管理 NP 口径。
  threshold_loader_entrypoint: "main.watermarking.fusion.neyman_pearson:load_thresholds_canonical"   # 阈值加载唯一入口（模块:函数）。
  fpr_key_format: "1e-03"                        # FPR key 规范样式（科学计数法字符串）。
  fpr_key_spec:
    exponent_digits: 2                           # 指数位宽固定为2位（如 -03）。
    example: "1e-03 (for 0.001)"                 # 人类可读示例，帮助审计比对。
    collision_check: true                        # 必须执行 key 冲突检测（防不同 FPR 落同一 key）。
  load_thresholds_canonical_signature:
    inputs:
      thresholds_path: "Path to thresholds JSON file"      # 输入阈值文件路径。
      target_fpr: "float"                        # 目标 FPR（数值语义由 NP 协议定义）。
    outputs:
      threshold_info: "Dict"                     # 返回结构体（包含阈值值、key 与元数据锚点）。
      required_fields:
        - "threshold_key_used"                   # 实际命中的 FPR key。
        - "threshold_value_used"                 # 实际用于判决的阈值数值。
        - "thresholds_digest"                    # 阈值文件内容摘要锚点。
        - "threshold_metadata_digest"            # 阈值元数据摘要锚点。
        - "metadata"                             # 校准元信息对象。
        - "fpr_key_collision_check"              # 冲突检测结果标记。
      field_verification_rule: >
        返回值必须包含上述所有 required_fields。
        若任何字段缺失或为 None/null，则视为加载器实现漂移，触发工程审计失败。
  metadata_required_keys:
    - "method"                                   # 阈值校准方法名称。
    - "null_source"                              # 原假设样本来源说明。
    - "n_null"                                   # 原假设样本数量。
    - "calibration_date"                         # 校准时间标记。
    - "quantile_method"                          # 分位数计算协议。
    - "target_fprs"                              # 该文件覆盖的目标 FPR 集合。
  delegation_rule: >
    所有 FPR key 格式化必须唯一通过 format_fpr_key_canonical。
    run_detect.py 与 run_calibrate.py 必须唯一通过 load_thresholds_canonical 读写阈值。
    禁止在这两个模块中重新实现阈值选择逻辑。

# ==============================================================
# RNG Context Management
#   - 随机性上下文冻结：可审计随机性锚点。
#   - 禁止隐式使用全局 RNG 状态；关键函数必须显式接收 generator。
#   - seed_parts → seed_digest 的派生必须可复算、可重演。
# ==============================================================
rng_context_management:      # 当前主链路未直接消费本段，RNGScope/stable_seed_from_parts/require_torch_generator 在 time_utils.py 实现。
  canonical_module: "main.core.time_utils"       # time_utils.py 统一管理 RNG 上下文相关功能。
  required_classes:
    - "RNGScope"                                 # 必须存在的上下文管理类。
  required_functions:
    - "stable_seed_from_parts"                   # seed_parts -> 稳定 seed / digest 的派生函数。
    - "require_torch_generator"                  # 关键生成入口的 generator 显式约束函数。
  rngscope_spec:
    constructor: "RNGScope(seed_parts: Dict, *, torch_device: Optional[str] = None)"
    seed_parts_example: |
      {
        "key_id": 1,
        "sample_idx": 0,
        "purpose": "pattern"
      }
    required_properties:
      - "torch_generator"                        # torch 侧随机源。
      - "numpy_rng"                              # numpy 侧随机源。
      - "seed_digest"                            # seed_parts 的可审计摘要。
      - "seed_value"                             # 最终用于初始化 RNG 的整数 seed。
    context_manager: true                        # 必须支持 with 语义，保证作用域内确定性。
  require_torch_generator_usage: >
    关键生成函数（pattern 生成、tie-break 等）必须显式接收 generator 参数。
    该函数应在函数入口调用，禁止隐式使用全局 RNG 状态。
  digest_computation_rule: >
    所有 seed_parts 派生摘要必须使用 canonical_digest（SHA256）。
    - canonical_digest 位于 main.core.digests（或由其导出）
    - 保证字典键排序与 JSON 序列化的确定性
    - 用于审计时重新计算并匹配记录中的摘要
  audit_fields_in_records: |
    生成结果中必须记录以下审计字段：
      [Pattern Seed 审计]
      - pattern_seed_used_source: Dict（seed_parts 完整记录，用于重演派生）
      - pattern_seed_used_digest: str（seed_parts 的 canonical_digest）
      [Subspace Seed 审计（仅当子空间启用时）]
      - subspace_seed_used_source: Dict
      - subspace_seed_used_digest: str

    审计验证协议（mandatory）：
      (1) Pattern Seed 审计（所有 embed trace）：
          - 检查 pattern_seed_used_source 存在且为非空 Dict 或 None
          - 检查 pattern_seed_used_digest 存在且为非空 str
          - 用 canonical_digest 重新计算 source 的摘要
          - 验证重新计算摘要与记录 digest 完全匹配
      (2) Subspace Seed 审计（仅当子空间启用时）：
          - 检查 subspace_seed_in_plan 非 None 判定子空间启用
          - 检查 subspace_seed_used_source 存在且为非空 Dict
          - 检查 subspace_seed_used_digest 存在且为非空 str
          - 用 canonical_digest 重新计算 source 的摘要
          - 验证重新计算摘要与记录 digest 完全匹配

# ==============================================================
# Enumeration Whitelists
#   - 枚举集中管理机制冻结。
#   - records/report 写入必须调用验证器；出现非法值必须 fail-fast。
# ==============================================================
enumeration_whitelists:      # 当前主链路未直接消费本段，枚举验证函数在 status.py，实现存在，段落主要用于契约声明。
  canonical_module: "main.core.status"      # status.py 统一定义与验证 status/fail/mismatch 枚举。
  required_constants:
    - "ALLOWED_STATUS_VALUES"               # status 白名单常量（ok/failed/mismatch/absent）。
    - "ALLOWED_MISMATCH_REASONS"            # mismatch_reason 白名单常量（一致性冲突原因）。
    - "ALLOWED_FAIL_REASONS"                # fail_reason 白名单常量（执行失败原因）。
  required_validators:
    - "validate_status"                     # status 写入前的合法性校验入口。
    - "validate_mismatch_reason"            # mismatch_reason 写入前的合法性校验入口。
    - "validate_fail_reason"                # fail_reason 写入前的合法性校验入口。
  allowed_literal_contexts:
    - context: "function_default_argument"
      description: "函数默认参数，例如 def f(status: str = \"ok\")"
    - context: "conditional_comparison"
      description: "条件判断，例如 if status == \"ok\" / != \"ok\""
    - context: "config_get_fallback"
      description: "配置读取的 fallback 值，例如 cfg.get(\"status\", \"ok\")"
    - context: "docstring_or_comment"
      description: "docstring/README/工程文档中的示例与说明"
  delegation_rule: |
    1) 所有枚举值必须从 canonical_module 导入并集中定义。
    2) records / report 写入时必须调用验证器（例如 validate_status）。
    3) 除了 allowed_literal_contexts 中的场景，推荐使用枚举常量，但不强制。
    4) 若 records / report 中出现不在白名单的值，必须立即 fail-fast。

# ==============================================================
# 审计元数据
#   - 仅用于离线/静态审计提示，严禁作为运行期反射依据。
# ==============================================================
non_executable_sections:     # 非执行段白名单；声明这些段仅用于离线审计，不作为运行反射输入。
  - "audit_metadata"                        # 将 audit_metadata 显式标记为非执行（仅 scripts/tests/人工审计读取）。

audit_metadata:              # 仅 scripts/tests/人工审计消费，主链路不执行此段。
  digest_canonicalization:                  # 对应 main.core.digests 的审计函数清单。
    required_functions:
      - "canonical_dumps"                   # 规范化 JSON 序列化函数（键顺序/格式稳定）。
      - "canonical_digest"                  # 规范摘要函数（用于 cfg/seed 等锚点）。
      - "sha256_hex_bytes"                  # 原始字节 SHA256 十六进制实现。
      - "strip_excluded_fields"             # 计算摘要前剔除排除字段的辅助函数。
  output_dir_naming:         # 对应目录命名相关函数清单；当前用于离线检查一致性。
    required_functions:
      - "parse_output_dir_name"             # 目录名 -> 字段对象的解析函数。
      - "validate_output_dir_name"          # 目录名格式与字段合法性校验函数。
      - "format_output_dir_name"            # 字段对象 -> 目录名的格式化函数。
      - "required_fields_from_contract"     # 从契约提取必需命名字段的映射函数。
  threshold_management:       # 对应 NP 阈值模块函数清单；用于审计函数存在性。
    required_functions:
      - "format_fpr_key_canonical"          # FPR key 规范格式化函数。
      - "validate_thresholds_metadata"      # 阈值元数据字段完整性与语义校验函数。
      - "load_thresholds_canonical"         # 阈值加载主入口（返回锚点字段）。

# ==============================================================
# Config Loader
#   - 配置加载与 cfg_digest / args_digest 口径冻结。
#   - cfg_digest_include_paths 定义 cfg_digest 输入域，是单因素可证的关键锚点。
#   - fixed_facts 规定 当前 Phase 固定事实值，用于压缩自由度。
#   - args_digest_payload_fields 规定 CLI 参数哪些计入 args_digest。
# ==============================================================
config_loader:               # contracts.py 仅解析其中 cfg_digest_include_paths 与 cfg_digest_override_applied_included。
  override_rules_version: "v1"              # override 规则语义版本；用于跨版本审计时确认口径未漂移。
  override_scope: "geometry_only"           # 覆写作用域限制：仅允许几何相关开关路径进入 runtime override。
  config_path_recording: "basename + cfg_digest" # records 中 config_path 的记录策略（文件名 + 有效配置摘要）。

  # ---- 处理流程顺序：冻结，不可颠倒 ----
  # cfg_digest 计算顺序冻结的执行保证：cfg_digest 必须在 override 之后计算，才能表达"有效配置"。
  computation_order:         # 对应 freeze_gate.cfg_digest_computation_order 的执行顺序约束。
    step_1: "load_config_from_file"                                       # 第1步：从配置文件载入原始 cfg。
    step_2: "apply_allowed_overrides_from_runtime_whitelist"              # 第2步：按 whitelist 应用允许的运行期覆写。
    step_3: "compute_cfg_digest_on_effective_config"                      # 第3步：对“生效后 cfg”计算 cfg_digest。
    step_4: "write_records_with_cfg_digest_and_override_applied_audit"    # 第4步：写入 records 与 override_applied 审计段。
    immutable: true                         # 顺序冻结：不得交换步骤，否则破坏可比性与追溯性。
    override_applied_audit_fields:
      - "field_path"                        # 被覆写的配置字段路径。
      - "old_value"                         # 覆写前的值。
      - "new_value"                         # 覆写后的值。
      - "source"                            # 覆写来源。
      - "override_mode"                     # 覆写模式。

  # 允许覆写模式枚举：用于冻结 override_mode 的语义口径。
  # 此阶段仅允许确定赋值，不允许条件选择与附加操作。
  override_mode_enum:        # 覆写模式枚举口径；与 override_applied 审计字段联动。
    allowed: ["set"]                        # 当前仅允许直接赋值覆写（不允许 add/append/expr 等模式）。
    immutable: true                         # 覆写模式枚举冻结：新增模式需版本化流程。

  # allowed_overrides 运行期映射已迁移到 runtime_whitelist.yaml。

  cfg_digest_include_paths:  # 主链路真实使用：config_loader.load_and_validate_config 按该路径子集计算 cfg_digest。
    - "watermark.key_id"                    # 水印 key 标识：决定密钥域，变化必须影响 cfg_digest。
    - "watermark.pattern_id"                # 水印 pattern 标识：决定图样方案版本。
    - "watermark.strength"                  # 注入强度参数：影响嵌入幅度。
    - "watermark.subspace.enabled"          # 子空间机制总开关。
    - "watermark.subspace.frame"            # 子空间参考坐标系/帧定义。
    - "watermark.subspace.selector_id"      # 子空间选择器实现标识。
    - "watermark.subspace.grid_rows"        # 子空间网格行数。
    - "watermark.subspace.grid_cols"        # 子空间网格列数。
    - "watermark.subspace.grid_h"           # 子空间单元高度参数。
    - "watermark.subspace.grid_w"           # 子空间单元宽度参数。
    - "watermark.subspace.k"                # 子空间主参数 k（与 topk 同类但语义不同）。
    - "watermark.subspace.topk"             # 子空间 top-k 选择阈值/数量。
    - "watermark.subspace.score_type"       # 子空间评分函数类型。
    - "watermark.subspace.channel_agg"      # 子空间通道聚合策略。
    - "model.model_id"                      # 模型标识（架构/权重族）。
    - "model.height"                        # 生成高度配置。
    - "model.width"                         # 生成宽度配置。
    - "model.dtype"                         # 模型运行精度。
    - "enable_xformers"                     # xformers 加速路径开关。
    - "generation.num_inference_steps"      # 扩散推理步数。
    - "generation.guidance_scale"           # CFG guidance scale 参数。
    - "detect.content.enabled"              # 内容证据分支开关。
    - "detect.geometry.enabled"             # 几何证据分支开关。
    - "detect.method"                       # 检测方法标识。
    - "detect.feature"                      # 检测特征类型/来源。
    - "evaluate.decoder_type"               # 评估阶段解码器类型。
    - "evaluate.target_fpr"                 # 评估目标 FPR。
    # Ablation 实验开关
    # 必须包含 ablation.normalized 以便 ablation flags 变化影响 cfg_digest
    - "ablation.normalized"                 # Ablation 规范化开关：变化需进入 cfg_digest 以保证实验可追溯。

  cfg_digest_override_applied_included: false    # 主链路真实使用：false 表示 override_applied 审计段不纳入 cfg_digest 输入域。

  fixed_facts:                                   # 固定事实约束（实验自由度压缩）；当前主要用于契约说明与审计对齐。
    watermark.subspace.channel_agg: "l2_sum"     # 固定子空间通道聚合口径，避免聚合方式漂移。
    model.dtype: "fp16"                          # 固定模型推理 dtype，保证跨运行可比性。
    evaluate.geometry.enabled: true              # 固定开启几何评估路径，保证报告语义一致。

  args_digest_payload_fields:               # args_digest 输入字段白名单；同类差异按命令类型分组。
    
    # embed 命令参数字段集合。
    embed:
      - "config_path"                       # 配置文件路径参数（参与 args_digest 的来源定位）。
      - "seed"                              # 生成随机种子输入。
      - "device"                            # 运行设备选择（cpu/cuda 等）。
      - "dtype"                             # 推理精度参数（如 fp16/fp32）。
      - "key_id"                            # 水印 key 标识。
      - "num_samples"                       # 批量生成样本数。
      - "prompts"                           # 文本提示词输入集合。
      - "output"                            # 输出根目录或目标路径。
      - "output_subdir"                     # 输出子目录命名参数。
    
    # detect 命令参数字段集合（含阈值与严格校验开关）。
    detect:
      - "config_path"                       # 检测阶段配置文件路径。
      - "target_fpr"                        # 目标 FPR，用于阈值选择。
      - "thresholds_file"                   # 阈值文件路径输入。
      - "image_dir"                         # 待检测图像目录。
      - "embed_trace"                       # 对应 embed trace 路径（完整性校验输入）。
      - "output"                            # 检测结果输出路径。
      - "device"                            # 检测运行设备。
      - "dtype"                             # 检测推理精度。
      - "threshold"                         # 直接指定阈值（与文件加载模式区分）。
      - "calibrate_result"                  # 校准结果文件输入。
      - "no_content"                        # 关闭内容证据分支开关。
      - "strict_integrity_check"            # 严格完整性校验开关。
      - "key_id"                            # 指定检测 key_id。
      - "pattern_seed_override"             # pattern seed 覆写参数（调试/对照用途）。
      - "wrong_key"                         # 错 key 对照测试开关。
      - "strict_freeze_policy"              # 严格冻结策略执行开关。
      - "enable_geometry"                   # 强制启用几何证据分支。
      - "disable_geometry"                  # 强制禁用几何证据分支。
    
    # calibrate 命令参数字段集合（侧重分位统计输入）。
    calibrate:
      - "config_path"                       # 校准阶段配置文件路径。
      - "score_field"                       # 用于分位估计的分数字段名。
      - "target_fpr"                        # 目标 FPR 集合或单值输入。
      - "max_samples"                       # 校准使用的最大样本数上限。
