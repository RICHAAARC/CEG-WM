# ==============================================================
# 冻结契约
#   门禁可执行：freeze_gate 在写盘前以本文件为唯一权威来源执行一致性校验。
#   - 本文件只冻结“语义与口径”，不包含运行期“允许集合”。
#   - 运行期允许集合必须放在 configs/runtime_whitelist.yaml。
#   - policy_path 的语义映射必须放在 configs/policy_path_semantics.yaml。
# ==============================================================

# ------------------------------
# 合同版本与冻结元信息
# - 用于记录与审计，不应作为运行期分支逻辑的自由输入。
# ------------------------------
contract_version: "v1.0"                    # 冻结契约版本号：同一可比较实验集合必须一致。
frozen_date: "2026-02-04"                   # 冻结日期：用于追溯。
phase: "phase-1-semantic-freeze"            # 阶段标识：仅用于说明冻结目标，不建议作为代码分支条件。

# ------------------------------
# 权威性声明
# - 此文件为“冻结语义”的唯一权威来源。
# ------------------------------
authority:
  location: "configs/frozen_contracts.yaml"           # 当前工程的唯一权威路径。
  uniqueness: "唯一权威。任何其他位置的'契约'文件均为运行配置或过期版本，不具有权威性。"
  modification_policy: "需代码审查 + 影响评估，禁止无审查直接修改。"

# ------------------------------
# 过期位置
# - 用于审计扫描，防止事实源分裂。
# - 临时备份文件，建议也加入列表。
# ------------------------------
deprecated_locations:
  - "policy/frozen_contracts.yaml.backup"

# ==============================================================
# 外部事实源依赖声明
#   - 只声明“依赖关系”，不在本文件重复定义允许集合或语义映射。
#   - freeze_gate 可在写盘前同时校验：contract_digest、whitelist_digest、semantics_digest。
#   - 本文件不承载 whitelist/semantics 内容，但声明其路径与“必须写入 records 的版本/摘要字段”。
# ==============================================================
external_fact_sources:
  frozen_contracts:
    path: "configs/frozen_contracts.yaml"
    required_record_fields:
      - "contract_version"
      - "contract_digest"
      - "contract_file_sha256"
      - "contract_canon_sha256"
      - "contract_bound_digest"
  runtime_whitelist:
    path: "configs/runtime_whitelist.yaml"
    required_record_fields:
      - "whitelist_version"
      - "whitelist_digest"
      - "whitelist_file_sha256"
      - "whitelist_canon_sha256"
      - "whitelist_bound_digest"
  policy_path_semantics:
    path: "configs/policy_path_semantics.yaml"
    required_record_fields:
      - "policy_path_semantics_version"
      - "policy_path_semantics_digest"
      - "policy_path_semantics_file_sha256"
      - "policy_path_semantics_canon_sha256"
      - "policy_path_semantics_bound_digest"
  records_schema_extensions:
    path: "configs/records_schema_extensions.yaml"
    required_record_fields: []
    recommended_record_fields:
      - "records_schema_extensions_version"
      - "records_schema_extensions_digest"
      - "records_schema_extensions_file_sha256"
      - "records_schema_extensions_canon_sha256"
      - "records_schema_extensions_bound_digest"
    optional_policy: "absent_ok"
    description: |
      可选事实源：append-only 字段扩展的权威来源。
      若启用 schema_extensions，则 records必须绑定上述锚点字段；否则允许 absent（但需记录未启用原因）。
      支持向后兼容：旧 records（未绑定该事实源）允许通过，但必须在 run_closure 中标记为 "extensions_not_enabled"。

# ==============================================================
# I/O Entry Points & Write Exceptions
#   - 写盘入口冻结：明确产物写盘必须收口的函数列表，禁止任何旁路写盘。
#   - 产物写盘必须收口到极少数入口函数；任何旁路写盘都会破坏可审计性与可复现性。
#   - io_exceptions 为空表示：不允许任何写盘例外。
#   - scripts/audits/audit_path_write_bypass.py 静态扫描旁路写盘。
#   - main.core.records_io 作为唯一写盘聚合点。
# ==============================================================
io_write_entrypoints:
  - "write_json"
  - "append_jsonl"
  - "write_text"
  - "write_artifact_json"
  - "write_artifact_json_unbound"
io_read_entrypoints:
  - "read_jsonl"
  - "read_json"
io_exceptions: []            # 严格模式：不允许任何写盘例外。

# ==============================================================
# Digest Canonicalization
#   - digest 口径冻结：唯一 JSON 序列化与摘要入口。
#   - 所有 digest 必须可复算。
#   - 禁止各模块自行 json.dumps + sha256；必须委托 canonical_digest。
# ==============================================================
digest_canonicalization:
  canonical_module: "main.core.digests"          # 工程统一从 main.core.digests 入口导出。
  frozen_parameters:
    separators: [",", ":"]
    sort_keys: true
    ensure_ascii: false
  delegation_rule: "仓库内所有用于 digest 的 JSON dumps 必须委托给 canonical_digest，禁止独立实现。"

# ==============================================================
# Freeze Gate Enforcement Requirements
#   - 高风险漏洞点的必须修补项：防止 YAML 声明沦为"纸面约束"而被旁路。
#   - 这些约束是"不可旁路的硬要求"，而非建议。
# ==============================================================
gate_enforcement_requirements:

  # ---- 域绑定校验缺失 ----
  impl_identity_domain_binding:
    enforcement: "must_enforce"
    requirement: |
      freeze_gate 必须执行按域（domain）的 impl_id 字段路径校验，禁止仅用 allowed_flat 校验。
      对每个 domain：
        1) 读取 frozen_contracts.yaml/impl_identity/field_paths_by_domain[domain] 指定的 records 字段路径
        2) 校验该字段的值必须属于 runtime_whitelist.yaml/impl_id/allowed_by_domain[domain]
        3) allowed_flat 仅可作为冗余展示或快速失败提示，不可替代按域校验
      目的：消除"impl_id 误绑定到错误 domain 字段"的旁路空间。

  # ---- version/digest/sha256 强制生成与验证 ----
  fact_source_binding_integrity:
    enforcement: "must_enforce"
    requirement: |
      freeze_gate 在 records 写盘前必须对三份事实源（frozen_contracts、runtime_whitelist、policy_path_semantics）执行完整性校验：
        1) 计算并记录三份 YAML 的 file_sha256（原文件内容）
        2) 计算并记录 canonical 化文本的 canon_sha256（规范化后的哈希）
        3) 计算 bound_digest = sha256(version + canon_sha256 + 关键段落摘要)，用于确保本次运行绑定了这三份 YAML 的具体内容
        4) 在同一运行中对内存对象再计算一次 digest，确保"文件内容"与"对象内容"一致
        5) 任何缺失、空字符串、长度不符（非 64 位小写十六进制）必须 fail-fast
      目的：防止攻击者或错误实现写入假值/空值，导致事实源绑定沦为"字段占位"。

  # ---- cfg_digest 计算顺序冻结 ----
  cfg_digest_computation_order:
    enforcement: "must_enforce"
    requirement: |
      实现必须严格遵循以下顺序且不可颠倒：
        1) load config from file
        2) apply allowed overrides (must read from runtime_whitelist.yaml/override/allowed_overrides)
        3) compute cfg_digest on effective config (after all overrides applied)
        4) write records with both cfg_digest and override_applied audit segment
      override_applied 审计段必须记录：field_path、old_value、new_value、source、override_mode
      目的：防止 cfg_digest 对应错误配置，导致 records 解释与对比失真。

  # ---- policy_path 语义驱动执行 ----
  policy_path_semantic_driven_execution:
    enforcement: "must_enforce"
    planned_state: "must_enforce"
    target_version: "v1.0"
    upgrade_condition: "Execute semantic access control  gate enforces required_chains and on_chain_failure"
    owner_gate: "execution.semantic_driven_execution"
    requirement: |
      decision 前必须读取 policy_path_semantics.yaml 对应 policy_path 的语义投射：
        1) 检查 required_chains：若 required chain 未启用或缺失证据，必须按 on_chain_failure 执行动作（failed/fallback/abstain），禁止自行 if/else 处理
        2) 检查 audit_obligations 指定的字段集：缺失时直接将 status 置为 absent 或 failed（由 frozen 约束决定），不可静默忽略
        3) 禁止"语义写在 YAML，执行在代码分支"的二元状态
      目的：避免融合层语义被代码分支隐式决定，保证可审计性。

  # ---- 枚举白名单唯一权威来源 ----
  enumeration_whitelist_authority:
    enforcement: "recommended_enforce"
    planned_state: "must_enforce"
    target_version: "v1.0"
    upgrade_condition: "Enum validation must be sourced from runtime_whitelist.yaml/enums"
    owner_gate: "gate.enumeration_whitelist_authority"
    authority_source: "runtime_whitelist.yaml/enums"
    requirement: |
      枚举值的唯一权威来源为 runtime_whitelist.yaml/enums，不可在代码中硬编码并与 YAML 维护两份。
      实践规范：
        1) main.core.status.py 等枚举模块仅提供类型别名与 validator
        2) validator 运行时从 runtime_whitelist.yaml 加载 allowed 集合（或导入生成的模块）
        3) 禁止常量硬编码，避免双源漂移
      目的：防止 YAML 与 Python 代码不一致导致的校验绕过。

  # ---- args_digest 非方法因素放大 ----
  args_digest_factor_separation:
    enforcement: "recommended_enforce"
    planned_state: "must_enforce"
    target_version: "v1.0"
    upgrade_condition: "args_digest_core and args_digest_io are split and validated"
    owner_gate: "gate.args_digest_factor_separation"
    requirement: |
      args_digest 若用于"单因素变化证明"，必须明确区分方法因子与非方法因子：
        1) 方法因子：impl_id、cfg_digest、thresholds_digest（核心证据）
        2) 非方法因子：output 路径、device、dtype 等（执行环境）
      建议：将 args_digest 拆分为 args_digest_core（方法因子）与 args_digest_io（非方法因子），冻结两个 digest 的口径。
      目的：避免输出路径变化造成"看似改变因素很多"，干扰单因素变化归因。

  # ---- facts extra keys 闭包策略 ----
  facts_extra_keys_policy:
    enforcement: "must_enforce"
    policy: "fail"
    scope:
      allowed_top_level_keys:
        runtime_whitelist:
          - "whitelist_version"
          - "policy_path"
          - "override"
          - "enums"
          - "impl_id"
          - "consistency_rules"
        policy_path_semantics:
          - "policy_path_semantics_version"
          - "hard_requirements"
          - "action_enum"
          - "global_semantics"
          - "field_catalog"
          - "catalogs_usage_rules"
          - "score_audit_naming_rules"
          - "condition_enum"
          - "policy_paths"
          - "soft_recommendations"
      allowed_policy_path_keys:
        - "decoder_type"
        - "description"
        - "required_chains"
        - "optional_chains"
        - "on_chain_failure"
        - "audit_obligations"
        - "geometry_gate"
    requirement: |
      facts YAML 的 extra keys 必须在契约声明的范围内闭包：
        1) runtime_whitelist 顶层仅允许 allowed_top_level_keys.runtime_whitelist
        2) policy_path_semantics 顶层仅允许 allowed_top_level_keys.policy_path_semantics
        3) policy_paths 各条目仅允许 allowed_policy_path_keys
      目的：防止事实源被悄然扩展导致口径漂移与门禁旁路。

  # ---- policy_path 值域闭包策略 ----
  policy_path_membership_policy:
    enforcement: "must_enforce"
    policy: "fail"
    scope:
      record_field_path: "policy_path"
      whitelist_allowed_path: "policy_path.allowed"
    requirement: |
      record.policy_path 必须属于 runtime_whitelist.yaml 的 policy_path.allowed。
      目的：确保 policy_path 取值严格闭包且可审计。

  # ---- override 枚举闭包策略 ----
  override_enum_policy:
    enforcement: "must_enforce"
    policy: "fail"
    scope:
      override_entries_path: "override.allowed_overrides"
      override_arg_name_allowed_path: "override.arg_name_enum.allowed"
      override_source_allowed_path: "override.source_enum.allowed"
      override_entry_fields:
        arg_name: "arg_name"
        source: "source"
    requirement: |
      runtime_whitelist.override.allowed_overrides 的 arg_name/source 必须属于对应枚举白名单。
      目的：防止 override 枚举漂移导致门禁规则被旁路。

  # ---- decoder_type 值域闭包策略 ----
  decoder_type_policy:
    enforcement: "must_enforce"
    policy: "fail"
    scope:
      semantics_policy_paths_path: "policy_paths"
      semantics_decoder_type_field: "decoder_type"
      whitelist_decoder_type_allowed_path: "enums.decoder_type.allowed"
    requirement: |
      policy_path_semantics.policy_paths[*].decoder_type 必须属于 runtime_whitelist.enums.decoder_type.allowed。
      目的：确保 decoder_type 的取值闭包与可审计性。

# ==============================================================
# Records Field Accessors
#   - records 字段访问语义收口。
#   - records 字段读取必须通过 accessor 统一完成，避免散落硬编码字段路径。
#   - require_present 仅负责统一报错格式，不得在内部解析 record。
# ==============================================================
record_accessors:
  canonical_module: "main.core.schema"           # schema.py 提供 accessor 或统一导出 accessor。
  minimum_required_accessors:
    - "get_record_type"
    - "get_sample_id"
    - "get_cfg_digest"
    - "get_policy_path"
    - "get_threshold_key_used"
    - "get_thresholds_digest"
    - "get_threshold_metadata_digest"
    - "get_subspace_frame_in_plan"
    - "get_subspace_frame_used"
    - "get_frame_diff"
    - "require_present"
  delegation_scope:
    scripts_mandatory: true                 # scripts/ 中的审计脚本必须使用 accessor。
    main_chain_gradual: false               # 主链路是否强制：当前 Phase 可先不强制，但建议后续收紧为 true。
  notes: >
    require_present(value, field_path, record_hint) 只能对“已抽取值”做统一报错格式，
    不在内部解析 record。字段路径解析权必须保留在各 accessor 内部。

# ==============================================================
# Records Schema
#   - when_chain_enabled 的判定来源。
# ==============================================================
records_schema:
  # ---- 链路是否启用的事实来源 ----
  chain_enablement_fields:
    content: "detect.content.enabled"
    geometry: "detect.geometry.enabled"

  # ---- 最终判决字段的权威路径 ----
  decision_field_path: "decision.is_watermarked"

  # ---- 冻结：records 的最小可审计字段集合 ----
  required_record_fields:
    # schema 版本锁定
    - schema_version

    # 冻结契约绑定
    - contract_version
    - contract_digest
    - contract_file_sha256
    - contract_canon_sha256
    - contract_bound_digest

    # 运行期白名单绑定
    - whitelist_version
    - whitelist_digest
    - whitelist_file_sha256
    - whitelist_canon_sha256
    - whitelist_bound_digest

    # policy_path 语义映射绑定
    - policy_path_semantics_version
    - policy_path_semantics_digest
    - policy_path_semantics_file_sha256
    - policy_path_semantics_canon_sha256
    - policy_path_semantics_bound_digest

    # 单因素可比性坐标
    - cfg_digest
    - policy_path

    # 方法身份坐标
    - impl.content_extractor_id
    - impl.geometry_extractor_id
    - impl.fusion_rule_id
    - impl.subspace_planner_id
    - impl.sync_module_id

    # 方法版本坐标
    # 按域拆分：便于审计定位变化源
    - impl.versions.content_extractor
    - impl.versions.geometry_extractor
    - impl.versions.fusion_rule
    - impl.versions.subspace_planner
    - impl.versions.sync_module

    # 方法摘要坐标
    # 按域拆分：便于离线验证实现一致性
    - impl.digests.content_extractor
    - impl.digests.geometry_extractor
    - impl.digests.fusion_rule
    - impl.digests.subspace_planner
    - impl.digests.sync_module

    # 统计与判决坐标
    - thresholds_digest
    - threshold_metadata_digest
    - thresholds_rule_id
    - thresholds_rule_version

  # ---- 审计义务：decision 字段的存在性与可空性约束 ----
  # decision 的存在性与可空性由"义务规则段"表达，而不是由 required 集合表达。
  # required 仅是"锚点字符串字段集合"；decision 允许 None，体现"可拒绝语义"。
  audit_obligations:
    decision_field_presence: "required"    # decision 字段必须存在于 records。
    decision_field_allow_null: true       # decision 字段允许值为 None。

  # ---- 字段注册表：所有事实源提到的 records 字段路径必须在此 ----
  field_paths_registry_semantics: "All record field paths used anywhere in contracts/whitelists/semantics MUST appear here."
  field_paths_registry:
    - schema_version
    - contract_version
    - contract_digest
    - contract_file_sha256
    - contract_canon_sha256
    - contract_bound_digest
    - whitelist_version
    - whitelist_digest
    - whitelist_file_sha256
    - whitelist_canon_sha256
    - whitelist_bound_digest
    - policy_path_semantics_version
    - policy_path_semantics_digest
    - policy_path_semantics_file_sha256
    - policy_path_semantics_canon_sha256
    - policy_path_semantics_bound_digest
    - cfg_digest
    - policy_path
    - detect.content.enabled
    - detect.geometry.enabled
    - impl.content_extractor_id
    - impl.geometry_extractor_id
    - impl.fusion_rule_id
    - impl.subspace_planner_id
    - impl.sync_module_id
    - impl.versions.content_extractor
    - impl.versions.geometry_extractor
    - impl.versions.fusion_rule
    - impl.versions.subspace_planner
    - impl.versions.sync_module
    - impl.digests.content_extractor
    - impl.digests.geometry_extractor
    - impl.digests.fusion_rule
    - impl.digests.subspace_planner
    - impl.digests.sync_module
    - thresholds_digest
    - threshold_metadata_digest
    - thresholds_rule_id
    - thresholds_rule_version
    - decision.is_watermarked
    - status
    - content_evidence.status
    - content_evidence.score
    - geometry_evidence.sync.status
    - content_evidence.fail_reason
    - score_audit.content_score_used
    - geometry_evidence.sync.reason
    - score_audit.geometry_gate_used
    - score_audit.geometry_fallback_triggered
    - score_audit.fusion_rule_used
    - decision.abstain_reason
    - score_audit.abstain_triggered_by
    # ---- 接口层字段追加（append-only） ----
    - content_evidence.mask_digest
    - content_evidence.mask_stats
    - content_evidence.plan_digest
    - content_evidence.basis_digest
    - content_evidence.lf_trace_digest
    - content_evidence.hf_trace_digest
    - content_evidence.injection_trace_digest
    - content_evidence.injection_params_digest
    - content_evidence.lf_score
    - content_evidence.hf_score
    - content_evidence.injection_status
