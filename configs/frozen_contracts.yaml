# ==============================================================
# 冻结契约
#   门禁可执行：freeze_gate 在写盘前以本文件为唯一权威来源执行一致性校验。
#   - 本文件只冻结“语义与口径”，不包含运行期“允许集合”。
#   - 运行期允许集合必须放在 configs/runtime_whitelist.yaml。
#   - policy_path 的语义映射必须放在 configs/policy_path_semantics.yaml。
# ==============================================================

# ------------------------------
# 合同版本与冻结元信息
# - 用于记录与审计，不应作为运行期分支逻辑的自由输入。
# ------------------------------
contract_version: "v1.0"     # 冻结契约版本号；main/core/contracts.py 强制必填并参与 contract_bound_digest 计算。
frozen_date: "2026-02-04"    # 冻结日期元信息；当前主链路不参与门禁计算，主要用于审计追溯。

# ------------------------------
# 权威性声明
# - 此文件为“冻结语义”的唯一权威来源。
# ------------------------------
authority:                   # contracts.py 解释面必填段；用于声明权威来源而非运行分支。
  location: "configs/frozen_contracts.yaml"           # 权威文件路径；与 contracts.py/freeze_gate.py 的 authoritative path 检查一致。
  uniqueness: "唯一权威。任何其他位置的'契约'文件均为运行配置或过期版本，不具有权威性。"
  modification_policy: "需代码审查 + 影响评估，禁止无审查直接修改。"

# ------------------------------
# 过期位置
# - 用于审计扫描，防止事实源分裂。
# - 临时备份文件，建议也加入列表。
# ------------------------------
deprecated_locations:        # contracts.py 解释面必填；用于标记已废弃事实源位置，防止双源漂移。
  - "policy/frozen_contracts.yaml.backup"   # 废弃路径样例；主要供审计脚本与人工巡检。

# ==============================================================
# 外部事实源依赖声明
#   - 只声明“依赖关系”，不在本文件重复定义允许集合或语义映射。
#   - freeze_gate 可在写盘前同时校验：contract_digest、whitelist_digest、semantics_digest。
#   - 本文件不承载 whitelist/semantics 内容，但声明其路径与“必须写入 records 的版本/摘要字段”。
# ==============================================================
external_fact_sources:       # contracts.py 必解析；_collect_required_record_fields 会并入 records 必填锚点。
  
  # 冻结契约事实源。
  frozen_contracts:
    path: "configs/frozen_contracts.yaml"             # 事实源权威路径；对应 contracts.py 加载入口。
    required_record_fields:                           # freeze_gate._validate_contract_fields 严格校验这些锚点与已加载对象一致。
      - "contract_version"
      - "contract_digest"
      - "contract_file_sha256"
      - "contract_canon_sha256"
      - "contract_bound_digest"
  
  # 运行白名单事实源。
  runtime_whitelist:
    path: "configs/runtime_whitelist.yaml"            # 对应 runtime_whitelist.load_runtime_whitelist 的权威路径。
    required_record_fields:                           # freeze_gate._validate_whitelist_fields 严格校验。
      - "whitelist_version"
      - "whitelist_digest"
      - "whitelist_file_sha256"
      - "whitelist_canon_sha256"
      - "whitelist_bound_digest"
  
  # policy_path 语义事实源。
  policy_path_semantics:
    path: "configs/policy_path_semantics.yaml"        # 对应 runtime_whitelist.load_policy_path_semantics 权威路径。
    required_record_fields:                           # freeze_gate._validate_semantics_fields 严格校验。
      - "policy_path_semantics_version"
      - "policy_path_semantics_digest"
      - "policy_path_semantics_file_sha256"
      - "policy_path_semantics_canon_sha256"
      - "policy_path_semantics_bound_digest"
  
  # 可选扩展事实源。
  records_schema_extensions:
    path: "configs/records_schema_extensions.yaml"    # 由 contracts._parse_records_schema_extensions 读取。
    required_record_fields: []                        # 为空表示当前不作为硬失败门槛。
    recommended_record_fields:                        # freeze_gate._enforce_records_schema_extensions_binding 仅推荐检查（不 fail）。
      - "records_schema_extensions_version"
      - "records_schema_extensions_digest"
      - "records_schema_extensions_file_sha256"
      - "records_schema_extensions_canon_sha256"
      - "records_schema_extensions_bound_digest"
    
    # 缺失允许策略；体现旧 records 兼容。
    optional_policy: "absent_ok"
    description: |
      可选事实源：append-only 字段扩展的权威来源。
      若启用 schema_extensions，则 records必须绑定上述锚点字段；否则允许 absent（但需记录未启用原因）。
      支持向后兼容：旧 records（未绑定该事实源）允许通过，但必须在 run_closure 中标记为 "extensions_not_enabled"。

# ==============================================================
# I/O Entry Points & Write Exceptions
#   - 写盘入口冻结：明确产物写盘必须收口的函数列表，禁止任何旁路写盘。
#   - 产物写盘必须收口到极少数入口函数；任何旁路写盘都会破坏可审计性与可复现性。
#   - io_exceptions 为空表示：不允许任何写盘例外。
#   - scripts/audits/audit_path_write_bypass.py 静态扫描旁路写盘。
#   - main.core.records_io 作为唯一写盘聚合点。
# ==============================================================
io_write_entrypoints:        # 写入口白名单；主链路通过 records_io 收口并由脚本审计旁路。
  - "write_json"
  - "append_jsonl"
  - "write_text"
  - "write_artifact_json"
  - "write_artifact_json_unbound"
io_read_entrypoints:         # 读入口白名单；用于约束统一读取路径。
  - "read_jsonl"
  - "read_json"
io_exceptions: []            # 严格模式：不允许任何写盘例外。

# ==============================================================
# Digest Canonicalization
#   - digest 口径冻结：唯一 JSON 序列化与摘要入口。
#   - 所有 digest 必须可复算。
#   - 禁止各模块自行 json.dumps + sha256；必须委托 canonical_digest。
# ==============================================================
digest_canonicalization:      # contracts.py 必解析；冻结 digest 计算口径。
  canonical_module: "main.core.digests"     # 工程统一从 main.core.digests 入口导出。
  frozen_parameters:                        # 与 main.core.digests 的 canonical JSON 参数语义对齐。
    separators: [",", ":"]
    sort_keys: true
    ensure_ascii: false
  delegation_rule: "仓库内所有用于 digest 的 JSON dumps 必须委托给 canonical_digest，禁止独立实现。"

# ==============================================================
# Freeze Gate Enforcement Requirements
#   - 高风险漏洞点的必须修补项：防止 YAML 声明沦为"纸面约束"而被旁路。
#   - 这些约束是"不可旁路的硬要求"，而非建议。
# ==============================================================
gate_enforcement_requirements:              # freeze_gate.enforce_gate_requirements / enforce_gate_policies 的规则事实源。

  # ---- 域绑定校验缺失 ----
  impl_identity_domain_binding:             # 主链路已执行：freeze_gate._enforce_impl_identity_domain_binding。
    enforcement: "must_enforce"             # must_enforce: 失败会阻断写盘。
    requirement: |
      freeze_gate 必须执行按域（domain）的 impl_id 字段路径校验，禁止仅用 allowed_flat 校验。
      对每个 domain：
        1) 读取 frozen_contracts.yaml/impl_identity/field_paths_by_domain[domain] 指定的 records 字段路径
        2) 校验该字段的值必须属于 runtime_whitelist.yaml/impl_id/allowed_by_domain[domain]
        3) allowed_flat 仅可作为冗余展示或快速失败提示，不可替代按域校验
      目的：消除"impl_id 误绑定到错误 domain 字段"的旁路空间。

  # ---- version/digest/sha256 强制生成与验证 ----
  fact_source_binding_integrity:            # 主链路已执行：contract/whitelist/semantics 三源锚点一致性。
    enforcement: "must_enforce"             # 对应 freeze_gate._enforce_fact_source_binding_integrity。
    requirement: |
      freeze_gate 在 records 写盘前必须对三份事实源（frozen_contracts、runtime_whitelist、policy_path_semantics）执行完整性校验：
        1) 计算并记录三份 YAML 的 file_sha256（原文件内容）
        2) 计算并记录 canonical 化文本的 canon_sha256（规范化后的哈希）
        3) 计算 bound_digest = sha256(version + canon_sha256 + 关键段落摘要)，用于确保本次运行绑定了这三份 YAML 的具体内容
        4) 在同一运行中对内存对象再计算一次 digest，确保"文件内容"与"对象内容"一致
        5) 任何缺失、空字符串、长度不符（非 64 位小写十六进制）必须 fail-fast
      目的：防止攻击者或错误实现写入假值/空值，导致事实源绑定沦为"字段基线缺省标识"。

  # ---- cfg_digest 计算顺序冻结 ----
  cfg_digest_computation_order:             # 主链路已执行：cfg_digest 与 override_applied 的先后关系校验。
    enforcement: "must_enforce"             # 对应 freeze_gate._enforce_cfg_digest_computation_order。
    requirement: |
      实现必须严格遵循以下顺序且不可颠倒：
        1) load config from file
        2) apply allowed overrides (must read from runtime_whitelist.yaml/override/allowed_overrides)
        3) compute cfg_digest on effective config (after all overrides applied)
        4) write records with both cfg_digest and override_applied audit segment
      override_applied 审计段必须记录：field_path、old_value、new_value、source、override_mode
      目的：防止 cfg_digest 对应错误配置，导致 records 解释与对比失真。

  # ---- policy_path 语义驱动执行 ----
  policy_path_semantic_driven_execution:    # 主链路已执行：按 semantics.required_chains / on_chain_failure 驱动。
    enforcement: "must_enforce"             # 对应 freeze_gate._validate_semantic_driven_execution。
    planned_state: "must_enforce"           # 规划状态：目标保持硬门禁。
    target_version: "v1.0"                  # 目标生效版本。
    upgrade_condition: "Execute semantic access control  gate enforces required_chains and on_chain_failure"  # 升级/收敛条件描述。
    owner_gate: "execution.semantic_driven_execution"  # 责任门禁标识。
    requirement: |
      decision 前必须读取 policy_path_semantics.yaml 对应 policy_path 的语义投射：
        1) 检查 required_chains：若 required chain 未启用或缺失证据，必须按 on_chain_failure 执行动作（failed/fallback/abstain），禁止自行 if/else 处理
        2) 检查 audit_obligations 指定的字段集：缺失时直接将 status 置为 absent 或 failed（由 frozen 约束决定），不可静默忽略
        3) 禁止"语义写在 YAML，执行在代码分支"的二元状态
      目的：避免融合层语义被代码分支隐式决定，保证可审计性。

  # ---- 枚举白名单唯一权威来源 ----
  enumeration_whitelist_authority:          # 推荐门禁：当前执行为告警，不阻断写盘。
    enforcement: "recommended_enforce"      # 对应 freeze_gate.enforce_recommended_requirements。
    planned_state: "must_enforce"           # 目标状态：后续版本计划升级为硬门禁。
    target_version: "v1.0"                  # 目标升级版本。
    upgrade_condition: "Enum validation must be sourced from runtime_whitelist.yaml/enums"  # 达成条件：枚举权威收敛到 whitelist。
    owner_gate: "gate.enumeration_whitelist_authority"     # 责任门禁标识；用于审计归因。
    authority_source: "runtime_whitelist.yaml/enums"  # 枚举唯一事实源路径。
    requirement: |
      枚举值的唯一权威来源为 runtime_whitelist.yaml/enums，不可在代码中硬编码并与 YAML 维护两份。
      实践规范：
        1) main.core.status.py 等枚举模块仅提供类型别名与 validator
        2) validator 运行时从 runtime_whitelist.yaml 加载 allowed 集合（或导入生成的模块）
        3) 禁止常量硬编码，避免双源漂移
      目的：防止 YAML 与 Python 代码不一致导致的校验绕过。

  # ---- args_digest 非方法因素放大 ----
  args_digest_factor_separation:            # 推荐门禁：当前为审计提醒，避免方法因子与环境因子混淆。
    enforcement: "recommended_enforce"      # 对应 freeze_gate._check_args_digest_factor_separation。
    planned_state: "must_enforce"           # 规划状态：后续升级为硬门禁。
    target_version: "v1.0"                  # 目标升级版本。
    upgrade_condition: "args_digest_core and args_digest_io are split and validated"  # 达成条件：核心/环境因子摘要分离。
    owner_gate: "gate.args_digest_factor_separation"  # 责任门禁标识。
    requirement: |
      args_digest 若用于"单因素变化证明"，必须明确区分方法因子与非方法因子：
        1) 方法因子：impl_id、cfg_digest、thresholds_digest（核心证据）
        2) 非方法因子：output 路径、device、dtype 等（执行环境）
      建议：将 args_digest 拆分为 args_digest_core（方法因子）与 args_digest_io（非方法因子），冻结两个 digest 的口径。
      目的：避免输出路径变化造成"看似改变因素很多"，干扰单因素变化归因。

  # ---- facts extra keys 闭包策略 ----
  facts_extra_keys_policy:                  # 主链路已执行：白名单与语义 YAML 顶层/条目键闭包检查。
    enforcement: "must_enforce"             # 对应 freeze_gate._enforce_facts_extra_keys_policy。
    policy: "fail"                          # fail: 命中违规立即阻断写盘。
    scope:                                  # 闭包作用域定义。
      allowed_top_level_keys:               # 顶层键闭包集合：防止事实源被隐式扩展。
        runtime_whitelist:
          - "whitelist_version"
          - "policy_path"
          - "override"
          - "enums"
          - "impl_id"
          - "consistency_rules"
          - "pipeline_realization"          # 真实 pipeline 构建策略
        policy_path_semantics:
          - "policy_path_semantics_version"
          - "hard_requirements"
          - "action_enum"
          - "global_semantics"
          - "field_catalog"
          - "catalogs_usage_rules"
          - "score_audit_naming_rules"
          - "condition_enum"
          - "policy_paths"
          - "soft_recommendations"
      allowed_policy_path_keys:             # policy_paths[*] 允许键闭包。
        - "decoder_type"
        - "description"
        - "required_chains"
        - "optional_chains"
        - "on_chain_failure"
        - "audit_obligations"
        - "geometry_gate"
    requirement: |
      facts YAML 的 extra keys 必须在契约声明的范围内闭包：
        1) runtime_whitelist 顶层仅允许 allowed_top_level_keys.runtime_whitelist
        2) policy_path_semantics 顶层仅允许 allowed_top_level_keys.policy_path_semantics
        3) policy_paths 各条目仅允许 allowed_policy_path_keys
      目的：防止事实源被悄然扩展导致口径漂移与门禁旁路。

  # ---- policy_path 值域闭包策略 ----
  policy_path_membership_policy:            # 主链路已执行：record.policy_path 必须落在 whitelist.policy_path.allowed。
    enforcement: "must_enforce"             # 对应 freeze_gate._enforce_policy_path_membership_policy。
    policy: "fail"                          # fail: 越界取值直接拒绝。
    scope:                                  # 成员关系校验作用域。
      record_field_path: "policy_path"      # 被校验的 records 字段路径。
      whitelist_allowed_path: "policy_path.allowed"        # 允许集合在 whitelist 的路径。
    requirement: |
      record.policy_path 必须属于 runtime_whitelist.yaml 的 policy_path.allowed。
      目的：确保 policy_path 取值严格闭包且可审计。

  # ---- override 枚举闭包策略 ----
  override_enum_policy:                     # 主链路已执行：override.allowed_overrides 的 arg_name/source 枚举闭包。
    enforcement: "must_enforce"             # 对应 freeze_gate._enforce_override_enum_policy。
    policy: "fail"                          # fail: 枚举漂移直接拒绝。
    scope:                                  # override 枚举校验作用域。
      override_entries_path: "override.allowed_overrides"                 # 被校验条目列表路径。
      override_arg_name_allowed_path: "override.arg_name_enum.allowed"    # arg_name 允许集合路径。
      override_source_allowed_path: "override.source_enum.allowed"        # source 允许集合路径。
      override_entry_fields:                # 每个 override 条目的字段映射。
        arg_name: "arg_name"                # 条目中的 arg_name 字段名。
        source: "source"                    # 条目中的 source 字段名。
    requirement: |
      runtime_whitelist.override.allowed_overrides 的 arg_name/source 必须属于对应枚举白名单。
      目的：防止 override 枚举漂移导致门禁规则被旁路。

  # ---- decoder_type 值域闭包策略 ----
  decoder_type_policy:                      # 主链路已执行：semantics.policy_paths[*].decoder_type 需在 whitelist 枚举内。
    enforcement: "must_enforce"             # 对应 freeze_gate._enforce_decoder_type_policy。
    policy: "fail"                          # fail: decoder_type 越界直接拒绝。
    scope:                                  # decoder_type 闭包校验作用域。
      semantics_policy_paths_path: "policy_paths"          # semantics 中 policy_paths 节点路径。
      semantics_decoder_type_field: "decoder_type"         # policy_paths 条目中的 decoder_type 字段名。
      whitelist_decoder_type_allowed_path: "enums.decoder_type.allowed"   # whitelist 允许集合路径。
    requirement: |
      policy_path_semantics.policy_paths[*].decoder_type 必须属于 runtime_whitelist.enums.decoder_type.allowed。
      目的：确保 decoder_type 的取值闭包与可审计性。

# ==============================================================
# Records Field Accessors
#   - records 字段访问语义收口。
#   - records 字段读取必须通过 accessor 统一完成，避免散落硬编码字段路径。
#   - require_present 仅负责统一报错格式，不得在内部解析 record。
# ==============================================================
record_accessors:            # contracts.py 解释面必填；当前主要作为访问语义契约。
  canonical_module: "main.core.schema"      # accessor 权威模块；scripts 按约束应优先使用该入口。
  minimum_required_accessors:
    - "get_record_type"
    - "get_sample_id"
    - "get_cfg_digest"
    - "get_policy_path"
    - "get_threshold_key_used"
    - "get_thresholds_digest"
    - "get_threshold_metadata_digest"
    - "get_subspace_frame_in_plan"
    - "get_subspace_frame_used"
    - "get_frame_diff"
    - "require_present"
  delegation_scope:                         # scripts_mandatory 针对脚本硬约束；main_chain_gradual 针对主链渐进收敛策略。
    scripts_mandatory: true                 # scripts/tests 优先消费，审计脚本必须通过 accessor 读取字段。
    main_chain_gradual: false               # 主链是否立即强制 accessor；false 表示当前仍允许渐进迁移。
  notes: >
    require_present(value, field_path, record_hint) 只能对“已抽取值”做统一报错格式，
    不在内部解析 record。字段路径解析权必须保留在各 accessor 内部。

# ==============================================================
# Records Schema
#   - when_chain_enabled 的判定来源。
# ==============================================================
records_schema:              # schema.validate_record + freeze_gate 的核心字段事实源。
  # ---- 链路是否启用的事实来源 ----
  chain_enablement_fields:                  # 链路启用判定路径；用于 required_chains 语义检查。
    content: "detect.content.enabled"
    geometry: "detect.geometry.enabled"

  # ---- 最终判决字段的权威路径 ----
  decision_field_path: "decision.is_watermarked"

  # ---- 冻结：records 的最小可审计字段集合 ----
  required_record_fields:                   # 写盘最小锚点集合；schema/freeze_gate 会校验存在性。
    # schema 版本锁定
    - schema_version                        # records schema 版本锚点。

    # 冻结契约绑定
    - contract_version                      # 冻结契约版本锚点。
    - contract_digest                       # 冻结契约语义摘要。
    - contract_file_sha256                  # 冻结契约原文件 SHA256。
    - contract_canon_sha256                 # 冻结契约 canonical 文本 SHA256。
    - contract_bound_digest                 # 冻结契约绑定摘要（version+canon+语义）。

    # 运行期白名单绑定
    - whitelist_version                     # 运行白名单版本锚点。
    - whitelist_digest                      # 运行白名单语义摘要。
    - whitelist_file_sha256                 # 运行白名单原文件 SHA256。
