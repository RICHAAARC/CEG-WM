    - paper_faithfulness.spec_canon_sha256
    - paper_faithfulness.spec_bound_digest
    - content_evidence.pipeline_fingerprint
    - content_evidence.pipeline_fingerprint_digest
    - content_evidence.injection_site_spec
    - content_evidence.injection_site_digest
    - content_evidence.alignment_report
    - content_evidence.alignment_digest
    - content_evidence.lf.ecc_spec_digest
    - content_evidence.hf_evidence_summary.repetition_factor

# ------------------------------
# 字段别名：用于历史兼容
# - 为空表示当前阶段不启用别名机制。
# ------------------------------
field_aliases: {}

# ==============================================================
# Impl Identity Binding
#   - impl 身份冻结：绑定 whitelist 允许集合与 records 字段路径。
#   - field_paths_by_domain 定义每个 domain 对应的 records 字段路径。
#   - 未来方法注入只能改变 impl.*_id 值，gate 必须验证值属于 whitelist 对应 domain 的 allowed 集合。
# ==============================================================
impl_identity:
  required: true

  # ---- domain 与 records 字段路径的映射冻结 ----
  # 必须与 runtime_whitelist.yaml 中 impl_id.allowed_by_domain 的 key 完全对齐。
  field_paths_by_domain:
    content_extractor: "impl.content_extractor_id"
    geometry_extractor: "impl.geometry_extractor_id"
    fusion_rule: "impl.fusion_rule_id"
    subspace_planner: "impl.subspace_planner_id"
    sync_module: "impl.sync_module_id"

  # ---- 按域拆分的版本与摘要字段 ----
  version_field_paths_by_domain:
    content_extractor: "impl.versions.content_extractor"
    geometry_extractor: "impl.versions.geometry_extractor"
    fusion_rule: "impl.versions.fusion_rule"
    subspace_planner: "impl.versions.subspace_planner"
    sync_module: "impl.versions.sync_module"

  digest_field_paths_by_domain:
    content_extractor: "impl.digests.content_extractor"
    geometry_extractor: "impl.digests.geometry_extractor"
    fusion_rule: "impl.digests.fusion_rule"
    subspace_planner: "impl.digests.subspace_planner"
    sync_module: "impl.digests.sync_module"

  # ---- 验证规则 ----
  validation_rule:
    任何 records 写出时，must_present impl.*_id、impl.versions.*、impl.digests.* 字段，且：
    1) impl.*_id 值必须属于 runtime_whitelist.yaml 的 impl_id.allowed_by_domain 对应 domain 集合
    2) impl.versions.* 必须为非空字符串，且必须匹配正则：^[A-Za-z0-9_.-]{1,64}$
    3) impl.digests.* 必须为 64 位小写十六进制字符串
    - freeze_gate 在写盘前执行此验证，失败则拒绝写入
    - 按域拆分保证单因素变化（仅特定 domain 的 impl 改变）可完全审计定位

# ==============================================================
# Status / Fail / Mismatch Enum
#   - 核心失败语义坐标系冻结。
#   - status 表达“检测过程状态”，不是最终水印判决。
#   - 最终判决必须使用 decision.is_watermarked 等独立字段，严禁复用 status。
# ==============================================================
status_enum:
  allowed_values: ["ok", "failed", "mismatch", "absent"]
  definitions:
    ok: "检测完成，无异常"
    failed: "检测过程发生异常或逻辑错误，具体原因见 fail_reason"
    mismatch: "检测与生成元数据不一致，具体原因见 mismatch_reason"
    absent: "检测输入缺少必需字段，无法执行检测"
  immutable: true
  notes: "此字段严禁改名、重定义语义。若需表达最终水印判决，使用 decision.is_watermarked，不得复用 status。"

fail_reason_enum:
  allowed_values:
    - "missing_required_field"
    - "pattern_seed_mismatch"
    - "subspace_frame_mismatch"
    - "cfg_digest_mismatch"
    - "inversion_failed"
    - "trace_extraction_failed"
    - "evidence_computation_failed"
    - "decoder_error"
    - "unknown"
  usage: "仅在 status == 'failed' 时填充"
  immutable: true

mismatch_reason_enum:
  allowed_values:
    - "subspace_frame_mismatch"
    - "cfg_digest_mismatch"
    - "plan_digest_mismatch"
    - "basis_digest_mismatch"
    - "planner_impl_identity_mismatch"
    - "trajectory_spec_digest_mismatch"
    - "trajectory_digest_mismatch"
    - "trajectory_evidence_invalid"
  usage: "仅在 status == 'mismatch' 时填充"
  immutable: true

# ==============================================================
# Output Directory Naming
#   - 输出目录命名与解析口径冻结。
#   - 禁止手写 split/regex 解析目录名，必须委托 output_naming 模块。
#   - policy_path 集合由 validator 委托 runtime_whitelist 校验。
# ==============================================================
output_dir_naming:
  canonical_module: "main.policy.path_policy"    # path_policy 作为唯一输出路径决策层。
  frozen_format: "cfg_<cfg_digest>_key_<key>_policy_<policy_path>"
  field_spec:
    cfg_digest:
      type: "hex64"
      source: "cfg 参数的 canonical_digest（通过 canonical_json / canonical_digest）"
      escapable: false
    key:
      type: "policy_id"
      regex: "^(?!.*_key_)(?!.*_policy_)[A-Za-z0-9_]+$"
      source: "policy 定义的 policy_id"
      escapable: false
      note: "不允许含 '_key_' 或 '_policy_' 子串，以避免与固定分隔符冲突"
    policy_path:
      type: "path"
      source: "融合策略 policy_path 枚举值（与 policy_path_semantics 对齐）；records 中存放解码后的明文枚举值"
      escaping: "base64url_no_padding"
      note: "不得包含 '=' padding；编码端必须输出无 padding 格式。"
  stable_fields_in_records: ["cfg_digest", "key", "policy_path"]
  delegation_rule: "所有目录名生成与解析必须唯一通过 output_naming 模块，禁止手写 split/regex。"
  contract_source: "此规则来自 configs/frozen_contracts.yaml，禁止任意 contract_path 参数绕过。"
  decoder_enum:
    allowed: ["raw", "base64url_no_padding"]
  parsing_rule:
    format_regex: "^cfg_([0-9a-f]{64})_key_((?!.*_key_)(?!.*_policy_)[A-Za-z0-9_]+)_policy_([a-zA-Z0-9_-]+)$"
    field_extractors:
      cfg_digest:
        group_index: 1
        decoder: "raw"
        validator: "hex64"
      key:
        group_index: 2
        decoder: "raw"
        validator: "policy_id_format"
      policy_path:
        group_index: 3
        decoder: "base64url_no_padding"
        validator: "policy_path_in_whitelist"         # 实际允许集合来自 runtime_whitelist.yaml。
        note: "decoder 必须按 base64url_no_padding 解释；输入不得含 '='。"

# ==============================================================
# Threshold Management
#   - 阈值管理口径冻结：Neyman–Pearson 统计锚点冻结。
#   - 所有与阈值相关的功能必须通过 canonical_module 定义的接口访问，禁止各模块自行实现阈值选择、加载、验证逻辑。
#   - thresholds_digest 与 threshold_metadata_digest 是可比性的关键锚点。
# ==============================================================
threshold_management:
  canonical_module: "main.watermarking.fusion.neyman_pearson"        # neyman_pearson.py 统一管理 NP 口径。
  threshold_loader_entrypoint: "main.watermarking.fusion.neyman_pearson:load_thresholds_canonical"
  fpr_key_format: "1e-03"
  fpr_key_spec:
    exponent_digits: 2
    example: "1e-03 (for 0.001)"
    collision_check: true
  load_thresholds_canonical_signature:
    inputs:
      thresholds_path: "Path to thresholds JSON file"
      target_fpr: "float"
    outputs:
      threshold_info: "Dict"
      required_fields:
        - "threshold_key_used"
        - "threshold_value_used"
        - "thresholds_digest"
        - "threshold_metadata_digest"
        - "metadata"
        - "fpr_key_collision_check"
      field_verification_rule: >
        返回值必须包含上述所有 required_fields。
        若任何字段缺失或为 None/null，则视为加载器实现漂移，触发工程审计失败。
  metadata_required_keys:
    - "method"
    - "null_source"
    - "n_null"
    - "calibration_date"
    - "quantile_method"
    - "target_fprs"
  delegation_rule: >
    所有 FPR key 格式化必须唯一通过 format_fpr_key_canonical。
    run_detect.py 与 run_calibrate.py 必须唯一通过 load_thresholds_canonical 读写阈值。
    禁止在这两个模块中重新实现阈值选择逻辑。

# ==============================================================
# RNG Context Management
#   - 随机性上下文冻结：可审计随机性锚点。
#   - 禁止隐式使用全局 RNG 状态；关键函数必须显式接收 generator。
#   - seed_parts → seed_digest 的派生必须可复算、可重演。
# ==============================================================
rng_context_management:
  canonical_module: "main.core.time_utils"       # time_utils.py 统一管理 RNG 上下文相关功能。
  required_classes:
    - "RNGScope"
  required_functions:
    - "stable_seed_from_parts"
    - "require_torch_generator"
  rngscope_spec:
    constructor: "RNGScope(seed_parts: Dict, *, torch_device: Optional[str] = None)"
    seed_parts_example: |
      {
        "key_id": 1,
        "sample_idx": 0,
        "purpose": "pattern"
      }
    required_properties:
      - "torch_generator"
      - "numpy_rng"
      - "seed_digest"
      - "seed_value"
    context_manager: true
  require_torch_generator_usage: >
    关键生成函数（pattern 生成、tie-break 等）必须显式接收 generator 参数。
    该函数应在函数入口调用，禁止隐式使用全局 RNG 状态。
  digest_computation_rule: >
    所有 seed_parts 派生摘要必须使用 canonical_digest（SHA256）。
    - canonical_digest 位于 main.core.digests（或由其导出）
    - 保证字典键排序与 JSON 序列化的确定性
    - 用于审计时重新计算并匹配记录中的摘要
  audit_fields_in_records: |
    生成结果中必须记录以下审计字段：
      [Pattern Seed 审计]
      - pattern_seed_used_source: Dict（seed_parts 完整记录，用于重演派生）
      - pattern_seed_used_digest: str（seed_parts 的 canonical_digest）
      [Subspace Seed 审计（仅当子空间启用时）]
      - subspace_seed_used_source: Dict
      - subspace_seed_used_digest: str

    审计验证协议（mandatory）：
      (1) Pattern Seed 审计（所有 embed trace）：
          - 检查 pattern_seed_used_source 存在且为非空 Dict 或 None
          - 检查 pattern_seed_used_digest 存在且为非空 str
          - 用 canonical_digest 重新计算 source 的摘要
          - 验证重新计算摘要与记录 digest 完全匹配
      (2) Subspace Seed 审计（仅当子空间启用时）：
          - 检查 subspace_seed_in_plan 非 None 判定子空间启用
          - 检查 subspace_seed_used_source 存在且为非空 Dict
          - 检查 subspace_seed_used_digest 存在且为非空 str
          - 用 canonical_digest 重新计算 source 的摘要
          - 验证重新计算摘要与记录 digest 完全匹配

# ==============================================================
# Enumeration Whitelists
#   - 枚举集中管理机制冻结。
#   - records/report 写入必须调用验证器；出现非法值必须 fail-fast。
# ==============================================================
enumeration_whitelists:
  canonical_module: "main.core.status"           # status.py 统一定义与验证 status/fail/mismatch 枚举。
  required_constants:
    - "ALLOWED_STATUS_VALUES"
    - "ALLOWED_MISMATCH_REASONS"
    - "ALLOWED_FAIL_REASONS"
  required_validators:
    - "validate_status"
    - "validate_mismatch_reason"
    - "validate_fail_reason"
  allowed_literal_contexts:
    - context: "function_default_argument"
      description: "函数默认参数，例如 def f(status: str = \"ok\")"
    - context: "conditional_comparison"
      description: "条件判断，例如 if status == \"ok\" / != \"ok\""
    - context: "config_get_fallback"
      description: "配置读取的 fallback 值，例如 cfg.get(\"status\", \"ok\")"
    - context: "docstring_or_comment"
      description: "docstring/README/工程文档中的示例与说明"
  delegation_rule: |
    1) 所有枚举值必须从 canonical_module 导入并集中定义。
    2) records / report 写入时必须调用验证器（例如 validate_status）。
    3) 除了 allowed_literal_contexts 中的场景，推荐使用枚举常量，但不强制。
    4) 若 records / report 中出现不在白名单的值，必须立即 fail-fast。

# ==============================================================
# 审计元数据
#   - 仅用于离线/静态审计提示，严禁作为运行期反射依据。
# ==============================================================
non_executable_sections:
  - "audit_metadata"

audit_metadata:
  digest_canonicalization:
    required_functions:
      - "canonical_dumps"
      - "canonical_digest"
      - "sha256_hex_bytes"
      - "strip_excluded_fields"
  output_dir_naming:
    required_functions:
      - "parse_output_dir_name"
      - "validate_output_dir_name"
      - "format_output_dir_name"
      - "required_fields_from_contract"
  threshold_management:
    required_functions:
      - "format_fpr_key_canonical"
      - "validate_thresholds_metadata"
      - "load_thresholds_canonical"

# ==============================================================
# Config Loader
#   - 配置加载与 cfg_digest / args_digest 口径冻结。
#   - cfg_digest_include_paths 定义 cfg_digest 输入域，是单因素可证的关键锚点。
#   - fixed_facts 规定 当前 Phase 固定事实值，用于压缩自由度。
#   - args_digest_payload_fields 规定 CLI 参数哪些计入 args_digest。
# ==============================================================
config_loader:
  override_rules_version: "v1"
  override_scope: "geometry_only"                     # 此阶段推荐仅允许 geometry 开关类覆写。
  config_path_recording: "basename + cfg_digest"

  # ---- 处理流程顺序：冻结，不可颠倒 ----
  # cfg_digest 计算顺序冻结的执行保证：cfg_digest 必须在 override 之后计算，才能表达"有效配置"。
  computation_order:
    step_1: "load_config_from_file"
    step_2: "apply_allowed_overrides_from_runtime_whitelist"
    step_3: "compute_cfg_digest_on_effective_config"
    step_4: "write_records_with_cfg_digest_and_override_applied_audit"
    immutable: true
    override_applied_audit_fields:
      - "field_path"                        # 被覆写的配置字段路径。
      - "old_value"                         # 覆写前的值。
      - "new_value"                         # 覆写后的值。
      - "source"                            # 覆写来源。
      - "override_mode"                     # 覆写模式。

  # 允许覆写模式枚举：用于冻结 override_mode 的语义口径。
  # 此阶段仅允许确定赋值，不允许条件选择与附加操作。
  override_mode_enum:
    allowed: ["set"]
    immutable: true

  # allowed_overrides 运行期映射已迁移到 runtime_whitelist.yaml。

  cfg_digest_include_paths:
    - "watermark.key_id"
    - "watermark.pattern_id"
    - "watermark.strength"
    - "watermark.subspace.enabled"
    - "watermark.subspace.frame"
    - "watermark.subspace.selector_id"
    - "watermark.subspace.grid_rows"
    - "watermark.subspace.grid_cols"
    - "watermark.subspace.grid_h"
    - "watermark.subspace.grid_w"
    - "watermark.subspace.k"
    - "watermark.subspace.topk"
    - "watermark.subspace.score_type"
    - "watermark.subspace.channel_agg"
    - "model.model_id"
    - "model.height"
    - "model.width"
    - "model.dtype"
    - "enable_xformers"
    - "generation.num_inference_steps"
    - "generation.guidance_scale"
    - "detect.content.enabled"
    - "detect.geometry.enabled"
    - "detect.method"
    - "detect.feature"
    - "evaluate.decoder_type"
    - "evaluate.target_fpr"

  cfg_digest_override_applied_included: false

  fixed_facts:
    watermark.subspace.channel_agg: "l2_sum"
    model.dtype: "fp16"
    evaluate.geometry.enabled: true

  args_digest_payload_fields:
    embed:
      - "config_path"
      - "seed"
      - "device"
      - "dtype"
      - "key_id"
      - "num_samples"
      - "prompts"
      - "output"
      - "output_subdir"
    detect:
      - "config_path"
      - "target_fpr"
      - "thresholds_file"
      - "image_dir"
      - "embed_trace"
      - "output"
      - "device"
      - "dtype"
      - "threshold"
      - "calibrate_result"
      - "no_content"
      - "strict_integrity_check"
      - "key_id"
      - "pattern_seed_override"
      - "wrong_key"
      - "strict_freeze_policy"
      - "enable_geometry"
      - "disable_geometry"
    calibrate:
      - "config_path"
      - "score_field"
      - "target_fpr"
      - "max_samples"
