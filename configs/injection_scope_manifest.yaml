injection_scope_manifest_version: "v2.0"  # v2.0：论文正式路径收口，移除全部旧 v1 paper-impl；仅保留 v2/v3 正式实现及必要测试支架

allowed_impl_ids:

  # ---- v2/v3 content chain 正式实现 ----
  - "semantic_mask_provider"                   # 语义掩码提供器（基础支架，继续保留）
  - "semantic_mask_provider_saliency_policy"  # saliency 策略版（继续保留）
  - "unified_content_extractor"                # Embed + Detect v2 正式实现
  - "low_freq_template_codec"                   # LF 低频模板编码器 v2 正式实现
  - "high_freq_truncation_codec"                # HF 高频截断编码器 v2 正式实现

  # ---- v2 subspace 正式实现 ----
  - "subspace_planner"                         # 子空间规划器 v2 正式实现

  # ---- 几何链 v2/v3 正式实现 ----
  - "attention_anchor_extractor"             # 无 proxy 几何锚点 v2 正式实现
  - "geometry_latent_sync_sd3"                 # geo_score=template_match_score v3 正式实现

  # ---- 融合层 v2 正式实现 ----
  - "fusion_neyman_pearson"                    # NP 融合 v2 正式实现

  # 注意：此列表必须是 runtime_whitelist.yaml:impl_id.allowed_flat 的子集或相等。
  # 违反闭合性将触发 BLOCK_FREEZE。
  # 生产部署前必须通过审计脚本 audit_injection_scope_manifest_binding.py 校验。

digest_scope:

  cfg_digest_include_paths:

    - "watermark.key_id"
    - "watermark.pattern_id"
    - "watermark.strength"

    - "watermark.subspace.enabled"
    - "watermark.subspace.frame"
    - "watermark.subspace.selector_id"
    - "watermark.subspace.grid_rows"
    - "watermark.subspace.grid_cols"
    - "watermark.subspace.grid_h"
    - "watermark.subspace.grid_w"
    - "watermark.subspace.k"
    - "watermark.subspace.topk"
    - "watermark.subspace.score_type"
    - "watermark.subspace.channel_agg"

    - "model.model_id"
    - "model.height"
    - "model.width"
    - "model.dtype"
    - "enable_xformers"

    - "generation.num_inference_steps"
    - "generation.guidance_scale"

    - "detect.content.enabled"
    - "detect.geometry.enabled"
    - "detect.method"
    - "detect.feature"

    - "evaluate.decoder_type"
    - "evaluate.target_fpr"

  plan_digest_include_paths:

    - "watermark.mask.threshold"
    - "watermark.mask.resolution_binding"
    - "watermark.mask.postprocess.enabled"
    - "watermark.mask.postprocess.kernel"
    - "watermark.mask.semantic_model_path"

    - "watermark.subspace.rank"
    - "watermark.subspace.grid_rows"
    - "watermark.subspace.grid_cols"
    - "watermark.subspace.topk"
    - "watermark.subspace.energy_ratio"
    - "watermark.subspace.mask_digest_binding"

    - "watermark.lf.codebook_id"
    - "watermark.lf.ecc"
    - "watermark.lf.ecc_sparsity"
    - "watermark.lf.strength"
    - "watermark.lf.delta"
    - "watermark.lf.block_length"
    - "watermark.lf.variance"  # 伪高斯方差（pseudogaussian variance），默认 1.5
    - "watermark.hf.codebook_id"
    - "watermark.hf.ecc"
    - "watermark.hf.enabled"
    - "watermark.hf.tail_truncation_ratio"
    - "watermark.hf.tail_truncation_mode"
    - "watermark.hf.sampling_stride"
    - "watermark.hf.energy_floor"
    - "watermark.hf.energy_cap"
    - "embed.geometry.sync_strength"

versioning_policy:

  bump_manifest_version_on_digest_scope_change: true
  bump_manifest_version_on_impl_scope_change: true

frozen_surface_protected_files:

  - "configs/frozen_contracts.yaml"
  - "configs/runtime_whitelist.yaml"
  - "configs/policy_path_semantics.yaml"
  - "main/policy/freeze_gate.py"
  - "main/core/digests.py"
  - "main/core/status.py"

operational_notes:

  - "Digest scope must remain append-only."
  - "Any new impl parameters must appear in plan_digest_include_paths."
  - "Removal of impl_id from allowed_impl_ids requires manifest version bump."
  
  - "LF Parameter Drift Detection (v1.1+):"
  - "  Watermark.lf.* parameters are critical for reproducibility and must:"
  - "    (a) Be included in plan_digest_include_paths (currently: codebook_id, ecc, strength)"
  - "    (b) Cause plan_digest to change when any parameter is modified"
  - "    (c) Be verified for consistency during detect phase"
  - "    (d) If parameters change but plan_digest does not, status='mismatch' must be returned"
  - "  This audit requirement prevents parameter drift attacks and ensures"
  - "  all watermark parameters remain traceable and auditable."
