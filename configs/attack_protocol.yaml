# ==============================================================
# 配置角色：评测攻击协议事实源
# - 本文件定义 append-only 的 attack family 与 params_version 协议集合。
# - 用于 calibration/evaluate 与 attack-group metrics 的统一口径。
# - 本文件不是运行主配置，不直接承载模型、推理或 watermark 开关。
# ==============================================================

version: "attack_protocol_v1"

family_field_candidates:
  - "attack.family"
  - "attack_family"
  - "attack.type"

params_version_field_candidates:
  - "attack.params_version"
  - "attack_params_version"

families:
  rotate:
    description: "rotation attacks"
    params_versions:
      v1:
        degrees: [5, 10, 15]
      v2:
        degrees: [12, 18, 24]
  resize:
    description: "resize attacks"
    params_versions:
      v1:
        scale_factors: [0.75, 0.9, 1.1]
      v2:
        scale_factors: [0.85, 0.70, 0.60]
  crop:
    description: "crop attacks"
    params_versions:
      v1:
        crop_ratios: [0.9, 0.8, 0.7]
      v2:
        crop_ratios: [0.85, 0.75, 0.65]
  translate:
    description: "translation attacks"
    params_versions:
      v1:
        x_shift: [-24, -12, 12, 24]
        y_shift: [-24, -12, 12, 24]
  jpeg:
    description: "jpeg compression attacks"
    params_versions:
      v1:
        quality: [95, 85, 75]
        seed_policy: "inherit"
  gaussian_noise:
    description: "additive gaussian noise attacks"
    params_versions:
      v1:
        sigma: [0.005, 0.01, 0.02]
        seed_policy: "inherit"
  gaussian_blur:
    description: "gaussian blur attacks"
    params_versions:
      v1:
        kernel_size: [3, 5]
        sigma: [0.8, 1.2]
        seed_policy: "inherit"
  composite:
    description: "ordered composite attack sequences"
    params_versions:
      rotate_resize_v1:
        steps:
          - family: "rotate"
            params: {degrees: 10}
          - family: "resize"
            params: {scale_factor: 0.9}
        seed_policy: "shared"
      rotate_resize_jpeg_v1:
        steps:
          - family: "rotate"
            params: {degrees: 12}
          - family: "resize"
            params: {scale_factor: 0.85}
          - family: "jpeg"
            params: {quality: 85}
        seed_policy: "shared"
      rotate_resize_jpeg_v2:
        steps:
          - family: "rotate"
            params: {degrees: 18}
          - family: "resize"
            params: {scale_factor: 0.75}
          - family: "jpeg"
            params: {quality: 75}
        seed_policy: "shared"
      crop_resize_v1:
        steps:
          - family: "crop"
            params: {crop_ratio: 0.85}
          - family: "resize"
            params: {scale_factor: 0.75}
        seed_policy: "shared"

params_versions:
  rotate::v1:
    family: "rotate"
    params: {degrees: [5, 10, 15]}
  rotate::v2:
    family: "rotate"
    params: {degrees: [12, 18, 24]}
  resize::v1:
    family: "resize"
    params: {scale_factors: [0.75, 0.9, 1.1]}
  resize::v2:
    family: "resize"
    params: {scale_factors: [0.85, 0.70, 0.60]}
  crop::v1:
    family: "crop"
    params: {crop_ratios: [0.9, 0.8, 0.7]}
  crop::v2:
    family: "crop"
    params: {crop_ratios: [0.85, 0.75, 0.65]}
  translate::v1:
    family: "translate"
    params: {x_shift: [-24, -12, 12, 24], y_shift: [-24, -12, 12, 24]}
  jpeg::v1:
    family: "jpeg"
    params: {quality: [95, 85, 75], seed_policy: "inherit"}
  gaussian_noise::v1:
    family: "gaussian_noise"
    params: {sigma: [0.005, 0.01, 0.02], seed_policy: "inherit"}
  gaussian_blur::v1:
    family: "gaussian_blur"
    params: {kernel_size: [3, 5], sigma: [0.8, 1.2], seed_policy: "inherit"}
  composite::rotate_resize_v1:
    family: "composite"
    params:
      steps:
        - family: "rotate"
          params: {degrees: 10}
        - family: "resize"
          params: {scale_factor: 0.9}
      seed_policy: "shared"
  composite::rotate_resize_jpeg_v1:
    family: "composite"
    params:
      steps:
        - family: "rotate"
          params: {degrees: 12}
        - family: "resize"
          params: {scale_factor: 0.85}
        - family: "jpeg"
          params: {quality: 85}
      seed_policy: "shared"
  composite::rotate_resize_jpeg_v2:
    family: "composite"
    params:
      steps:
        - family: "rotate"
          params: {degrees: 18}
        - family: "resize"
          params: {scale_factor: 0.75}
        - family: "jpeg"
          params: {quality: 75}
      seed_policy: "shared"
  composite::crop_resize_v1:
    family: "composite"
    params:
      steps:
        - family: "crop"
          params: {crop_ratio: 0.85}
        - family: "resize"
          params: {scale_factor: 0.75}
      seed_policy: "shared"
