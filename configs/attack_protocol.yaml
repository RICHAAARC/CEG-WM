# ==============================================================
# 配置角色：评测攻击协议事实源
# - 本文件定义 append-only 的 attack family 与 params_version 协议集合。
# - 用于 calibration/evaluate 与 attack-group metrics 的统一口径。
# - 本文件不是运行主配置，不直接承载模型、推理或 watermark 开关。
# ==============================================================

version: "attack_protocol_v1"

family_field_candidates:
  - "attack.family"
  - "attack_family"
  - "attack.type"

params_version_field_candidates:
  - "attack.params_version"
  - "attack_params_version"

families:
  rotate:
    description: "rotation attacks"
    params_versions:
      v1:
        degrees: [5, 10, 15]
      v2:
        degrees: [12, 18, 24]
      v3:
        degrees: [18, 20, 22, 24, 27]
      v4:
        degrees: [18, 20, 22, 24, 27]
      v5:
        degrees: [19, 21, 23, 26, 30]
  resize:
    description: "resize attacks"
    params_versions:
      v1:
        scale_factors: [0.75, 0.9, 1.1]
      v2:
        scale_factors: [0.85, 0.70, 0.60]
      v3:
        scale_factors: [0.75, 0.70, 0.65, 0.60]
      v4:
        scale_factors: [0.75, 0.70, 0.675, 0.65, 0.60]
  crop:
    description: "crop attacks"
    params_versions:
      v1:
        crop_ratios: [0.9, 0.8, 0.7]
      v2:
        crop_ratios: [0.85, 0.75, 0.65]
      v3:
        crop_ratios: [0.8, 0.75, 0.7, 0.65]
      v4:
        crop_ratios: [0.80, 0.75, 0.70, 0.675, 0.65]
      v5:
        crop_ratios: [0.78, 0.72, 0.68, 0.62, 0.58]
  translate:
    description: "translation attacks"
    params_versions:
      v1:
        x_shift: [-24, -12, 12, 24]
        y_shift: [-24, -12, 12, 24]
      v2:
        x_shift: [8, 12, 16]
        y_shift: [0, 4, 8]
  jpeg:
    description: "jpeg compression attacks"
    params_versions:
      v1:
        quality: [95, 85, 75]
        seed_policy: "inherit"
  gaussian_noise:
    description: "additive gaussian noise attacks"
    params_versions:
      v1:
        sigma: [0.005, 0.01, 0.02]
        seed_policy: "inherit"
  gaussian_blur:
    description: "gaussian blur attacks"
    params_versions:
      v1:
        kernel_size: [3, 5]
        sigma: [0.8, 1.2]
        seed_policy: "inherit"
  composite:
    description: "ordered composite attack sequences"
    params_versions:
      rotate_resize_v1:
        steps:
          - family: "rotate"
            params: {degrees: 10}
          - family: "resize"
            params: {scale_factor: 0.9}
        seed_policy: "shared"
      rotate_resize_jpeg_v1:
        steps:
          - family: "rotate"
            params: {degrees: 12}
          - family: "resize"
            params: {scale_factor: 0.85}
          - family: "jpeg"
            params: {quality: 85}
        seed_policy: "shared"
      rotate_resize_jpeg_v2:
        steps:
          - family: "rotate"
            params: {degrees: 18}
          - family: "resize"
            params: {scale_factor: 0.75}
          - family: "jpeg"
            params: {quality: 75}
        seed_policy: "shared"
      rotate_resize_jpeg_v3:
        steps:
          - family: "rotate"
            params: {degrees: 24}
          - family: "resize"
            params: {scale_factor: 0.70}
          - family: "jpeg"
            params: {quality: 75}
        seed_policy: "shared"
      rotate_resize_jpeg_v4:
        steps:
          - family: "rotate"
            params: {degrees: 18}
          - family: "resize"
            params: {scale_factor: 0.75}
          - family: "jpeg"
            params: {quality: 75}
        seed_policy: "shared"
      rotate_resize_jpeg_v5:
        steps:
          - family: "rotate"
            params: {degrees: 24}
          - family: "resize"
            params: {scale_factor: 0.70}
          - family: "jpeg"
            params: {quality: 75}
        seed_policy: "shared"
      crop_resize_v1:
        steps:
          - family: "crop"
            params: {crop_ratio: 0.85}
          - family: "resize"
            params: {scale_factor: 0.75}
        seed_policy: "shared"
      crop_resize_v2:
        steps:
          - family: "crop"
            params: {crop_ratio: 0.80}
          - family: "resize"
            params: {scale_factor: 0.70}
        seed_policy: "shared"
      crop_resize_v3:
        steps:
          - family: "crop"
            params: {crop_ratio: 0.80}
          - family: "resize"
            params: {scale_factor: 0.70}
        seed_policy: "shared"
      rotate_crop_v1:
        steps:
          - family: "rotate"
            params: {degrees: 19}
          - family: "crop"
            params: {crop_ratio: 0.78}
        seed_policy: "shared"
      rotate_crop_v2:
        steps:
          - family: "rotate"
            params: {degrees: 23}
          - family: "crop"
            params: {crop_ratio: 0.72}
        seed_policy: "shared"
      rotate_resize_jpeg_v6:
        steps:
          - family: "rotate"
            params: {degrees: 26}
          - family: "resize"
            params: {scale_factor: 0.66}
          - family: "jpeg"
            params: {quality: 70}
        seed_policy: "shared"
      crop_resize_translate_v1:
        steps:
          - family: "crop"
            params: {crop_ratio: 0.68}
          - family: "resize"
            params: {scale_factor: 0.62}
          - family: "translate"
            params: {x_shift: 8, y_shift: 0}
        seed_policy: "shared"
      rotate_translate_resize_v1:
        steps:
          - family: "rotate"
            params: {degrees: 21}
          - family: "translate"
            params: {x_shift: 12, y_shift: 4}
          - family: "resize"
            params: {scale_factor: 0.72}
        seed_policy: "shared"

