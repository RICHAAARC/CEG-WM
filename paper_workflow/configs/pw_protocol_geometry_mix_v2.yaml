      - "positive_source"
      - "clean_negative"
    calibration_event_id_keys:
      positive_source: "calib_pos_event_ids"
      clean_negative: "calib_neg_event_ids"
    evaluate_role_order:
      - "positive_source"
      - "clean_negative"
    evaluate_event_id_keys:
      positive_source: "eval_pos_event_ids"
      clean_negative: "eval_neg_event_ids"
geometry_dominant_severity_ladder:
  matrix_profile: "geometry_mix_v2"
  matrix_version: "pw_attack_matrix_geometry_mix_v2"
  target_subset: "attacked_positive_content_failed_subset"
  rescue_validation_hypothesis: "formal_geometry_conditional_rescue_favors_multi_evidence_chain"
append_only_contract:
